name: Publish Docker image

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

# Read the source to build; write to GHCR to publish the image.
permissions:
  contents: read
  packages: write

# A newer push to the same branch/tag cancels the in-flight build — saves runner minutes.
concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # GHCR requires an all-lowercase image path. The owner (LiftedHoldings) is fixed,
  # so we hardcode the lowercase form rather than compute it at runtime.
  IMAGE: ghcr.io/liftedholdings/lifted-sign

jobs:
  publish:
    name: build + push (ghcr.io)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags and labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
