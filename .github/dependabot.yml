# Dependabot keeps runtime/dev dependencies and CI actions patched.
# https://docs.github.com/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  # Python dependencies declared in pyproject.toml.
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python
    commit-message:
      prefix: "deps"
      prefix-development: "deps-dev"
      include: scope
    groups:
      # One PR for routine minor/patch bumps; majors still land on their own.
      python-minor-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions pinned in .github/workflows/*.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "ci"
      include: scope
    groups:
      actions-all:
        patterns:
          - "*"
