  async function api(path, opts) {
    opts = opts || {};
    opts.credentials = "same-origin";
    opts.headers = opts.headers || {};
    if (opts.json !== undefined) {
      opts.headers["Content-Type"] = "application/json";
      opts.body = JSON.stringify(opts.json);
      delete opts.json;
    }
    var r;
    try {
      r = await fetch(path, opts);
    } catch (e) {
      // Network drop / offline / DNS — surface as status 0 so callers can show a retry instead
      // of hanging on a spinner forever (or crashing on `undefined.status`).
      return { status: 0, ok: false, data: null, netError: true };
    }
    var data = null;
    try { data = await r.json(); } catch (e) { data = null; }
    return { status: r.status, ok: r.ok, data: data };
  }

  function statusBadge(s) {
    var map = {
      draft: "ap-badge--plain", out_for_signature: "ap-badge--info",
      sent: "ap-badge--info", viewed: "ap-badge--warn",
      completed: "ap-badge--ok", voided: "ap-badge--err", cancelled: "ap-badge--err",
      declined: "ap-badge--err", sealing: "ap-badge--info", expired: "ap-badge--warn"
    };
    var labels = {
      draft: "Draft", out_for_signature: "Out for signature", sent: "Sent", viewed: "Viewed",
      completed: "Completed", voided: "Voided", cancelled: "Cancelled", declined: "Declined",
      sealing: "Finalizing…", expired: "Expired"
    };
    var cls = map[s] || "ap-badge--plain";
    return '<span class="ap-badge ' + cls + '">' + esc(labels[s] || s || "draft") + "</span>";
  }
  var SIGNER_STATUS = {
    pending: { label: "Not sent", cls: "ap-badge--plain" },
    sent: { label: "Awaiting", cls: "ap-badge--info" },
    viewed: { label: "Opened", cls: "ap-badge--warn" },
    signed: { label: "Signed", cls: "ap-badge--ok" },
    declined: { label: "Declined", cls: "ap-badge--err" }
  };
  var TERMINAL = { completed: 1, voided: 1, cancelled: 1, declined: 1, expired: 1 };
  function fmtDate(ts) {
    if (!ts) return "—";
    try { return new Date(ts * 1000).toLocaleDateString(); } catch (e) { return "—"; }
  }
  function fmtDateTime(ts) {
    if (!ts) return "—";
    try { return new Date(ts * 1000).toLocaleString(); } catch (e) { return "—"; }
  }
  function clearTrackPoll() {
    if (state.trackTimer) { clearInterval(state.trackTimer); state.trackTimer = null; }
    destroyPdf();
  }
  // Release the PDF.js document + worker on every view switch (clearTrackPoll runs at the top of
  // renderDashboard/openTrack/renderAccount/openEditor/renderLanding). renderEditor()'s frequent
  // innerHTML rebuilds do NOT call this, so the cached doc survives ordinary field edits.
  function destroyPdf() {
    var e = state.editor;
    if (e && e.pdfDoc) { try { e.pdfDoc.destroy(); } catch (_) {} }
    if (e) { dropBitmaps(e); e.pdfDoc = null; e.pdfDocVer = null; e.pdfMissVer = null; e.pdfTexts = {}; }
  }
  // Close GPU-backed ImageBitmaps before dropping the cache so zoom churn releases memory
  // promptly instead of waiting on GC. Also drops the scale-dependent laid-out text spans (their
  // positions are baked at the old width); the raw textContent (pdfTexts) is scale-free and kept.
  function dropBitmaps(e) {
    if (e && e.pdfBitmaps) {
      Object.keys(e.pdfBitmaps).forEach(function (k) {
        var c = e.pdfBitmaps[k];
        if (c && c.bmp && typeof c.bmp.close === "function") { try { c.bmp.close(); } catch (_) {} }
      });
    }
    if (e) { e.pdfBitmaps = {}; e.pdfText = {}; }
  }
  // Live-region toast (WCAG 4.1.3). Insert the empty node FIRST, then set text on the next
  // frame so NVDA/JAWS reliably fire the announcement (a node inserted with text already set is
  // announced inconsistently). Errors route through role="alert"/assertive via {error:true}.
  // Severity icons — routed through svg() so they share the one stroke idiom (24-grid, weight 2).
  var TOAST_ICON = {
    success: svg('<path d="M5 13l4 4 10-10"/>'),
    info:    svg('<circle cx="12" cy="12" r="9"/><path d="M12 11v5"/><path d="M12 8h.01"/>'),
    warning: svg('<path d="M12 3.5 22 20H2z"/><path d="M12 10v4.5"/><path d="M12 17.5h.01"/>'),
    error:   svg('<circle cx="12" cy="12" r="9"/><path d="M9 9l6 6M15 9l-6 6"/>')
  };
  // Severity-aware live-region toast. Back-compat: toast('x') => info; {error:true} => error (kept,
  // incl. the legacy sg-toast-err class + role=alert/assertive). New: {type:'success'|'info'|
  // 'warning'|'error'}; type wins over the legacy error flag. Only error escalates to assertive; the
  // rest stay polite status. Empty node inserted FIRST, message text set on the next frame (icon is
  // aria-hidden) so NVDA/JAWS fire the announcement reliably (aria-atomic keeps it one unit).
  function toast(msg, opts) {
    opts = opts || {};
    var type = opts.type || (opts.error ? "error" : "info");
    if (!TOAST_ICON[type]) type = "info";
    var assertive = type === "error";
    var t = document.createElement("div");
    t.className = "sg-toast sg-toast--" + type + (assertive ? " sg-toast-err" : "");
    t.setAttribute("role", assertive ? "alert" : "status");
    t.setAttribute("aria-live", assertive ? "assertive" : "polite");
    t.setAttribute("aria-atomic", "true");
    var ic = document.createElement("span");
    ic.className = "sg-toast__ic"; ic.setAttribute("aria-hidden", "true");
    ic.innerHTML = TOAST_ICON[type];
    var tx = document.createElement("span");
    tx.className = "sg-toast__msg";
    t.appendChild(ic); t.appendChild(tx);
    document.body.appendChild(t);                                  // empty live region in DOM first
    requestAnimationFrame(function () { tx.textContent = msg; });  // then populate → announced
    setTimeout(function () { if (t.parentNode) t.parentNode.removeChild(t); }, 3200);
  }

  // --- boot -----------------------------------------------------------------
  // Warn before a browser close/refresh drops unsaved editor work (Back auto-saves; this covers
  // the cases the SPA can't intercept). The generic browser prompt is all beforeunload allows.
  window.addEventListener("beforeunload", function (ev) {
    if (state.editor && state.editor.dirty) { ev.preventDefault(); ev.returnValue = ""; }
  });

  // Single document-level editor keydown (added once — renderEditor rebuilds the DOM constantly, so
  // a per-render listener would leak). Inert unless the editor is mounted (.sg-editor present) and no
  // review modal is open (sg-scrim owns keys then). It powers undo/redo, zoom shortcuts, and Esc-
  // disarm. CRITICAL vs Pass-4: it acts ONLY on Ctrl+z/y/=/-/0 and BARE Esc — never bare arrows,
  // bare Delete, or Ctrl+arrow (the Pass-4 field bindings), and the inField guard keeps native undo
  // inside inputs/textarea/contenteditable. Enter/Space page-placement stays owned by the page handler.
  document.addEventListener("keydown", function (ev) {
    if (!state.editor || !document.querySelector(".sg-editor")) return; // editor not mounted
    if (document.getElementById("sg-scrim")) return;                    // review modal owns keys
    var t = ev.target, tag = t && t.tagName;
    var inField = tag === "INPUT" || tag === "TEXTAREA" || (t && t.isContentEditable);
    var mod = ev.ctrlKey || ev.metaKey, k = ev.key;
    // Undo / redo — native inside text inputs (inField) so Ctrl+Z there stays native.
    if (mod && !inField && (k === "z" || k === "Z")) { ev.preventDefault(); ev.shiftKey ? redo() : undo(); return; }
    if (mod && !inField && (k === "y" || k === "Y")) { ev.preventDefault(); redo(); return; }
    // Zoom
    if (mod && (k === "=" || k === "+")) { ev.preventDefault(); zoomStep(0.25); return; }
    if (mod && (k === "-" || k === "_")) { ev.preventDefault(); zoomStep(-0.25); return; }
    if (mod && k === "0")                { ev.preventDefault(); zoomTo(1);      return; }
    // Esc cancels a pending field placement (never touches Enter/Space placement).
    if (k === "Escape" && !inField) {
      var e = state.editor;
      if (e.tool !== "select" && !e.redact && !e.texting && !e.editing) { e.tool = "select"; e.armHint = false; renderEditor(); }
    }
  });

  async function boot() {
    // Email-verification link landing (?verified=1 / ?verify_error) — flash then clean the URL.
    try {
      var q = new URLSearchParams(location.search);
      if (q.get("need_2fa")) { history.replaceState(null, "", "/signapp"); return renderTotpPrompt(); }
      if (q.get("verified")) { setTimeout(function () { toast("Email verified — you're all set to send."); }, 400); }
      else if (q.get("verify_error")) { setTimeout(function () { toast("That verification link is invalid or expired."); }, 400); }
      if (q.get("verified") || q.get("verify_error")) history.replaceState(null, "", "/signapp");
    } catch (e) {}
    var r = await api("/api/sign-portal/auth/me");
    if (r.status === 200 && r.data && r.data.account) {
      state.account = r.data.account;
      renderDashboard();
      return maybeSuggest2FA();
    }
    // Logged out → learn which sign-in methods this install offers, then render the auth card.
    var mr = await api("/api/sign-portal/auth/methods");
    if (mr.ok && mr.data) state.methods = mr.data;
    return renderLanding("login");
  }

  // --- landing (logged-out) -------------------------------------------------
  function renderLanding(tab, msg) {
    clearTrackPoll();
    state.account = null;
    h(
      topbar(false) +
      '<div class="auth">' +
        '<aside class="auth__aside">' +
          '<span class="lds-globe auth__globe" data-size="300" aria-hidden="true"></span>' +
          '<div class="auth__intro">' +
            '<span class="auth__eyebrow">Lifted Sign</span>' +
            '<h1 class="auth__head">Signed, sealed,<br><span class="grad">delivered.</span></h1>' +
            '<p class="auth__lead">Turn your PDFs into legally-binding agreements — drop the fields, route each one to every signer, and get back a tamper-evident sealed document with a full Certificate of Completion.</p>' +
          "</div>" +
          authInstrument() +
          '<div class="auth__chips">' +
            '<span class="auth__chip">' + icShield() + " PAdES-certified seal</span>" +
            '<span class="auth__chip">' + icScale() + " ESIGN &amp; UETA</span>" +
            '<span class="auth__chip">' + icCert() + " Certificate of Completion</span>" +
          "</div>" +
        "</aside>" +
        '<main class="auth__main">' +
          authCard(msg) +
        "</main>" +
      "</div>"
    );
    bootGlobes();
    wireAuthCard();
  }

  // Config-aware auth card: email magic-link is always offered (needs only SIGN_SECRET); Google and
  // phone appear ONLY when /auth/methods reported them configured, so no dead buttons on a self-host.
  function authCard(msg) {
    var m = authMethods();
    var blocks = [magicForm()];
    if (m.google) {
      blocks.push('<div class="divider">or</div>');
      blocks.push('<button class="ap-btn btn-google" id="btn-google">' + googleMark() + " Continue with Google</button>");
    }
    if (m.phone) {
      blocks.push('<div class="divider">or use your phone</div>');
      blocks.push(phoneForm());
    }
    var sub = (m.google || m.phone)
      ? "No passwords — get a sign-in link by email, or continue with " +
        (m.google && m.phone ? "Google or your phone." : m.google ? "Google." : "your phone.")
      : "No passwords — we'll email you a secure sign-in link.";
    return (
      '<div class="ap-card ap-card--edge authcard">' +
        '<span class="beta-chip"><span class="live"></span> Free during beta</span>' +
        '<h2 class="authcard__h">Sign in or sign up</h2>' +
        '<p class="authcard__sub">' + sub + "</p>" +
        blocks.join("") +
        (msg ? '<p class="ok" style="margin-top:14px">' + esc(msg) + "</p>" : "") +
        '<div class="auth-trust">' + icLock() + " PAdES/PKCS#7 certification · tamper-evident seal</div>" +
      "</div>"
    );
  }

  // Email magic-link form — the zero-config default sign-in.
  function magicForm() {
    return (
      '<form class="stack" id="form-magic">' +
        fld("mg-email", "email", "Email address", ' autocomplete="email" inputmode="email" required aria-describedby="mg-err"') +
        '<div class="err" id="mg-err" role="alert"></div>' +
        '<button class="ap-btn ap-btn--primary" type="submit">Email me a sign-in link</button>' +
      "</form>" +
      '<p class="authcard__hint" style="margin-top:8px">New here? Clicking the link creates your account. Signed copies go to this address.</p>'
    );
  }

  function wireAuthCard() {
    var m = authMethods();
    if (m.google) { var g = el("btn-google"); if (g) g.onclick = function () { window.location = "/api/sign-portal/auth/google"; }; }
    if (m.phone) wirePhone();
    wireMagic();
  }

  function wireMagic() {
    var f = el("form-magic");
    if (!f) return;
    f.onsubmit = async function (e) {
      e.preventDefault();
      el("mg-err").textContent = "";
      el("mg-email").removeAttribute("aria-invalid");
      var email = el("mg-email").value.trim();
      if (!email || email.indexOf("@") < 1) { el("mg-err").textContent = "Enter a valid email address."; el("mg-email").setAttribute("aria-invalid", "true"); return; }
      var btn = f.querySelector('button[type="submit"]');
      if (btn) btn.disabled = true;
      var r = await api("/api/sign-portal/auth/magic/start", { method: "POST", json: { email: email } });
      if (btn) btn.disabled = false;
      if (r.netError) { el("mg-err").textContent = "You appear to be offline — try again."; return; }
      if (r.status === 400) { el("mg-err").textContent = "Enter a valid email address."; el("mg-email").setAttribute("aria-invalid", "true"); return; }
      return renderMagicSent(email);
    };
  }

  // Enumeration-safe confirmation — never confirms whether the address has an account.
  function renderMagicSent(email) {
    h(
      topbar(false) +
      '<div class="auth-solo">' +
        '<div class="auth-solo__globe"><span class="lds-globe" data-size="60" aria-hidden="true"></span></div>' +
        '<div class="ap-card ap-card--edge authcard" style="max-width:none">' +
          '<h2 class="solo__h">Check your email</h2>' +
          '<p class="solo__sub">If <b>' + esc(email) + "</b> can sign in here, a secure link is on its way. It expires in 15 minutes.</p>" +
          '<button class="ap-btn ap-btn--primary" type="button" id="mg-back">Back to sign in</button>' +
        "</div>" +
      "</div>"
    );
    bootGlobes();
    el("mg-back").onclick = function () { renderLanding("login"); };
  }

  // Floating-label field: input carries placeholder=" " so :placeholder-shown
  // drives the label; the <label> MUST follow the input for the + selector.
  function fld(id, type, label, attrs) {
    return '<div class="fld"><input class="ap-input" id="' + id + '" type="' + type +
      '" placeholder=" "' + (attrs || "") + '><label for="' + id + '">' + label + "</label></div>";
  }
  function phoneForm() {
    return (
      '<form class="stack" id="form-phone">' +
        fld("ph-phone", "tel", "Phone number", ' autocomplete="tel" inputmode="tel" required aria-describedby="ph-err"') +
        fld("ph-email", "email", "Email", ' autocomplete="email" aria-describedby="ph-err"') +
        fld("ph-name", "text", "Name or company (optional)", ' autocomplete="name"') +
        '<div class="err" id="ph-err" role="alert"></div>' +
        '<button class="ap-btn ap-btn--primary" type="submit">Text me a code</button>' +
      "</form>" +
      '<p class="authcard__hint" style="margin-top:8px">New here? Your email is where we send the signed copies. Returning with this number? Just your phone.</p>'
    );
  }
  function wirePhone() {
    el("form-phone").onsubmit = async function (e) {
      e.preventDefault();
      el("ph-err").textContent = "";
      el("ph-phone").removeAttribute("aria-invalid");
      var phone = el("ph-phone").value.trim();
      var email = el("ph-email").value.trim();
      var name = el("ph-name").value.trim();
      if (!phone) { el("ph-err").textContent = "Enter your phone number."; el("ph-phone").setAttribute("aria-invalid", "true"); return; }
      var r = await api("/api/sign-portal/auth/phone/start", { method: "POST", json: { phone: phone, email: email, name: name } });
      if (r.netError) { el("ph-err").textContent = "You appear to be offline — try again."; return; }
      if (r.ok && r.data && r.data.ok) return renderPhoneCode(phone, email, name);
      if (r.status === 429) { el("ph-err").textContent = "Too many attempts — wait a few minutes and try again."; return; }
      if (r.status === 503) { el("ph-err").textContent = "Texting is temporarily unavailable — continue with Google."; return; }
      el("ph-err").textContent = "That doesn't look like a valid phone number.";
      el("ph-phone").setAttribute("aria-invalid", "true");
    };
  }

  function renderPhoneCode(phone, email, name) {
    h(
      topbar(false) +
      '<div class="auth-solo">' +
        '<div class="auth-solo__globe"><span class="lds-globe" data-size="60" aria-hidden="true"></span></div>' +
        '<div class="ap-card ap-card--edge authcard" style="max-width:none">' +
          '<h2 class="solo__h">Enter your code</h2>' +
          '<p class="solo__sub">We texted a code to <b>' + esc(phone) + "</b>.</p>" +
          '<form class="stack" id="form-code">' +
            '<div class="fld"><input class="ap-input" id="pc-code" inputmode="numeric" pattern="[0-9]*" maxlength="8" placeholder=" " autocomplete="one-time-code" required aria-describedby="pc-err"><label for="pc-code">Verification code</label></div>' +
            '<div class="err" id="pc-err" role="alert"></div>' +
            '<button class="ap-btn ap-btn--primary" type="submit">Verify &amp; continue</button>' +
            '<button class="li-forgot" type="button" id="pc-resend">Resend code</button>' +
            '<button class="li-forgot" type="button" id="pc-back">Use a different method</button>' +
          "</form>" +
        "</div>" +
      "</div>"
    );
    bootGlobes();
    el("form-code").onsubmit = async function (e) {
      e.preventDefault();
      el("pc-err").textContent = "";
      el("pc-code").removeAttribute("aria-invalid");
      var r = await api("/api/sign-portal/auth/phone/verify", { method: "POST", json: { code: el("pc-code").value.trim() } });
      if (r.netError) { el("pc-err").textContent = "You appear to be offline — try again."; return; }
      if (r.ok && r.data && r.data.next === "2fa") return renderTotpPrompt();  // account has Google Authenticator armed
      if (r.ok && r.data && r.data.ok && r.data.account) { state.account = r.data.account; renderDashboard(); return maybeSuggest2FA(); }
      var err = r.data && r.data.error;
      if (err === "email_required") return renderLanding(null, "That number is new — add your email and we'll text a fresh code.");
      if (err === "email_in_use") return renderLanding(null, "That email already has an account — sign in with Google, or use the phone number already on it.");
      if (err === "expired") return renderLanding(null, "That code expired — request a new one.");
      if (err === "signups_closed") return renderLanding(null, "This install isn't accepting new sign-ups — ask the operator for access.");
      el("pc-err").textContent = "Invalid code — check it and try again.";
      el("pc-code").setAttribute("aria-invalid", "true");
    };
    el("pc-resend").onclick = async function () {
      // resend WITH the original email/name so a new-number signup keeps its email in the cookie
      await api("/api/sign-portal/auth/phone/start", { method: "POST", json: { phone: phone, email: email || "", name: name || "" } });
      toast("Code resent.");
    };
    el("pc-back").onclick = function () { renderLanding(); };
  }

  // Second-factor prompt (Google Authenticator / TOTP), shown when an account has 2FA armed —
  // reached from phone-verify (next:"2fa") or the Google callback (?need_2fa=1). The pending-2FA
  // cookie was set server-side; this only collects the 6-digit code.
  function renderTotpPrompt() {
    h(
      topbar(false) +
      '<div class="auth-solo">' +
        '<div class="auth-solo__globe"><span class="lds-globe" data-size="60" aria-hidden="true"></span></div>' +
        '<div class="ap-card ap-card--edge authcard" style="max-width:none">' +
          '<h2 class="solo__h">Two-factor code</h2>' +
          '<p class="solo__sub">Enter the 6-digit code from your authenticator app.</p>' +
          '<form class="stack" id="form-totp">' +
            '<div class="fld"><input class="ap-input" id="tf-code" inputmode="numeric" pattern="[0-9]*" maxlength="8" placeholder=" " autocomplete="one-time-code" required aria-describedby="tf-err"><label for="tf-code">Verification code</label></div>' +
            '<div class="err" id="tf-err" role="alert"></div>' +
            '<button class="ap-btn ap-btn--primary" type="submit">Verify</button>' +
            '<button class="li-forgot" type="button" id="tf-back">Back to sign in</button>' +
          "</form>" +
        "</div>" +
      "</div>"
    );
    bootGlobes();
    el("form-totp").onsubmit = async function (e) {
      e.preventDefault();
      el("tf-err").textContent = "";
      el("tf-code").removeAttribute("aria-invalid");
      var r = await api("/api/sign-portal/auth/2fa", { method: "POST", json: { code: el("tf-code").value.trim() } });
      if (r.netError) { el("tf-err").textContent = "You appear to be offline — try again."; return; }
      if (r.ok && r.data && r.data.ok && r.data.account) { state.account = r.data.account; return renderDashboard(); }
      el("tf-err").textContent = (r.data && r.data.error === "expired") ? "That step timed out — sign in again." : "Invalid code — try again.";
      el("tf-code").setAttribute("aria-invalid", "true");
      if (r.data && r.data.error === "expired") setTimeout(function () { renderLanding(); }, 1400);
    };
    el("tf-back").onclick = function () { renderLanding(); };
  }

  // Optional post-login nudge: suggest Google Authenticator to accounts without it. Shown at most
  // once (dismiss is remembered), never for accounts that already armed 2FA.
  function maybeSuggest2FA() {
    try {
      if (!state.account || state.account.totp_enabled) return;
      if (localStorage.getItem("ls_2fa_dismissed") === "1") return;
    } catch (e) { return; }
    if (document.getElementById("sg-scrim")) return;
    var scrim = document.createElement("div");
    scrim.className = "sg-scrim"; scrim.id = "sg-scrim";
    scrim.innerHTML =
      '<div class="sg-modal" role="dialog" aria-modal="true" aria-label="Add two-factor authentication" tabindex="-1">' +
        "<h2>Add an extra layer</h2>" +
        '<p class="muted" style="margin:0 0 8px">Protect your account with Google Authenticator — a 6-digit code from your phone at sign-in. Optional, and you can do it anytime in Account.</p>' +
        '<div class="row" style="justify-content:flex-end;margin-top:18px;gap:8px">' +
          '<button class="ap-btn ap-btn--ghost" id="s2-later">Not now</button>' +
          '<button class="ap-btn ap-btn--primary" id="s2-go">Set up 2FA</button>' +
        "</div>" +
      "</div>";
    document.body.appendChild(scrim);
    function close() { if (scrim.parentNode) scrim.parentNode.removeChild(scrim); }
    scrim.addEventListener("click", function (ev) { if (ev.target === scrim) close(); });
    el("s2-later").onclick = function () { try { localStorage.setItem("ls_2fa_dismissed", "1"); } catch (e) {} close(); };
    el("s2-go").onclick = function () { try { localStorage.setItem("ls_2fa_dismissed", "1"); } catch (e) {} close(); renderAccount(); };
  }

  // --- dashboard ------------------------------------------------------------
  function topbar(authed) {
    return (
      '<header class="topbar"><div class="topbar__in">' +
        '<div class="brand"><span class="lds-globe" data-size="26" aria-hidden="true"></span><span>Lifted <b>Sign</b></span></div>' +
        (authed
          ? '<nav class="topnav" aria-label="Main">' +
              '<button class="topnav__link" id="nav-docs">Documents</button>' +
              '<button class="topnav__link" id="nav-tpl">Templates</button>' +
              '<button class="topnav__link" id="nav-dev">Developers</button>' +
              '<span class="topnav__sep" aria-hidden="true"></span>' +
              '<button class="topnav__link" id="nav-acct">Account</button>' +
              '<button class="ap-btn ap-btn--ghost ap-btn--sm" id="nav-logout">Sign out</button>' +
            "</nav>"
          : "") +
      "</div></header>"
    );
  }

  function wireTopbar() {
    // Route the editor-exit topbar actions through leaveEditor so Account/Sign out also save
    // unsaved field work first (Back is wired the same way). In non-editor views leaveEditor is a
    // pass-through. logout is an in-app action (no page nav), so beforeunload wouldn't catch it.
    if (el("nav-docs")) el("nav-docs").onclick = function () { leaveEditor(renderDashboard); };
    if (el("nav-tpl")) el("nav-tpl").onclick = function () { leaveEditor(renderTemplates); };
    if (el("nav-dev")) el("nav-dev").onclick = function () { leaveEditor(renderApiKeys); };
    if (el("nav-acct")) el("nav-acct").onclick = function () { leaveEditor(renderAccount); };
    if (el("nav-logout")) el("nav-logout").onclick = function () { leaveEditor(logout); };
    // mark the active nav link for the current view
    var active = state._view;
    if (active && el("nav-" + active)) el("nav-" + active).classList.add("is-active");
    bootGlobes();
  }
  // Save-if-dirty before leaving the editor; on save FAILURE keep the user here (never silently
  // drop placed fields) with a message they can act on. Pass-through when not in a dirty editor.
  async function leaveEditor(next) {
    var e = state.editor;
    if (e && e.dirty) {
      try {
        await persist();
      } catch (err) {
        return toast(
          err.message === "no-signers" ? "Add a signer's name or email to save your fields."
          : err.message === "auth" ? "Please sign in again to save."
          : "Couldn't save your changes — check your connection and try again.",
          { error: true }
        );
      }
    }
    next();
  }

  async function logout() {
    await api("/api/sign-portal/auth/logout", { method: "POST" });
    renderLanding("login");
  }

  // Status buckets shared by the KPI summary + the filter chips (one source of truth).
  function dashBucket(s) {
    if (!s || s === "draft") return "draft";
    if (s === "out_for_signature" || s === "sent" || s === "viewed" || s === "sealing") return "sent";
    if (s === "completed") return "completed";
    return "closed"; // voided / cancelled / declined
  }
  var DASH_CHIPS = [
    { key: "all", label: "All" },
    { key: "draft", label: "Draft" },
    { key: "sent", label: "Sent" },
    { key: "completed", label: "Completed" },
    { key: "closed", label: "Voided / Declined" }
  ];
  // Searchable haystack for a list row — document name + any signer name/email the list carries
  // (the list shape varies; probe the known optional fields defensively, all lower-cased once).
  function dashHay(d) {
    var parts = [d.name || ""];
    var sg = d.signers || d.recipients;
    if (Array.isArray(sg)) sg.forEach(function (s) { parts.push(s.name || "", s.email || ""); });
    if (d.signer_names) parts.push(d.signer_names);
    if (d.signer_emails) parts.push(d.signer_emails);
    return parts.join(" ").toLowerCase();
  }
  function dashFiltered() {
    var d = state.dash || { docs: [], search: "", filter: "all" };
    var q = (d.search || "").trim().toLowerCase();
    return d.docs.filter(function (row) {
      if (d.filter !== "all" && dashBucket(row.status) !== d.filter) return false;
      if (q && dashHay(row).indexOf(q) < 0) return false;
      return true;
    });
  }
  function dashRowHtml(d) {
    return (
      "<tr>" +
        '<td><div class="doc-cell"><span class="doc-ic">' + icDoc() + '</span><span class="doc-name" data-open="' + d.id + '" data-st="' + esc(d.status || "") + '">' + esc(d.name || "Untitled") + "</span></div></td>" +
        "<td>" + statusBadge(d.status) + "</td>" +
        '<td class="prog">' + (d.signed_n || 0) + "/" + (d.signer_n || 0) + "</td>" +
        "<td>" + fmtDate(d.created_at) + "</td>" +
        '<td><div class="rowacts">' + rowActions(d) + "</div></td>" +
      "</tr>"
    );
  }
  // Table (or a small "no match" state) for the CURRENT search/filter — repainted in place without
  // a refetch when the search box or a chip changes.
  function dashListHtml() {
    var rows = dashFiltered();
    if (!rows.length) {
      return '<div class="tbl-wrap"><p class="dash-nomatch">No documents match your search.</p></div>';
    }
    return '<div class="tbl-wrap"><table class="doc-table"><thead><tr>' +
      "<th>Document</th><th>Status</th><th>Signers</th><th>Created</th><th></th>" +
      "</tr></thead><tbody>" + rows.map(dashRowHtml).join("") + "</tbody></table></div>";
  }
  function dashKpisHtml(docs) {
    var c = { draft: 0, sent: 0, completed: 0, closed: 0 };
    docs.forEach(function (d) { c[dashBucket(d.status)]++; });
    function tile(cls, n, label) {
      return '<div class="dash-kpi dash-kpi--' + cls + '"><span class="dash-kpi__n">' + n + '</span><span class="dash-kpi__l">' + label + "</span></div>";
    }
    return '<div class="dash-kpis">' +
      tile("draft", c.draft, "Draft") +
      tile("sent", c.sent, "Sent") +
      tile("completed", c.completed, "Completed") +
      tile("closed", c.closed, "Voided / Declined") +
    "</div>";
  }
  function dashToolbarHtml() {
    var d = state.dash;
    var chips = DASH_CHIPS.map(function (ch) {
      return '<button type="button" class="dash-chip' + (d.filter === ch.key ? " is-active" : "") +
        '" aria-pressed="' + (d.filter === ch.key ? "true" : "false") + '" data-filter="' + ch.key + '">' + ch.label + "</button>";
    }).join("");
    return '<div class="dash-tools">' +
      '<div class="dash-search">' + svg('<circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/>', ' class="dash-search__ic"') +
        '<input class="ap-input" id="dash-search" type="search" placeholder="Search documents or signers" aria-label="Search documents" value="' + esc(d.search || "") + '"></div>' +
      '<div class="dash-chips" role="group" aria-label="Filter by status">' + chips + "</div>" +
    "</div>";
  }
  // Repaint just the filtered list (+ chip active states) with no refetch — used on search/filter.
  function paintDashList() {
    var host = el("dash-list");
    if (host) host.innerHTML = dashListHtml();
    Array.prototype.forEach.call(document.querySelectorAll("[data-filter]"), function (b) {
      var on = state.dash.filter === b.getAttribute("data-filter");
      b.classList.toggle("is-active", on);
      b.setAttribute("aria-pressed", on ? "true" : "false");
    });
    wireDashRows();
  }
  function wireDashRows() {
    Array.prototype.forEach.call(document.querySelectorAll("[data-act]"), function (btn) {
      btn.onclick = function () { docAction(btn.getAttribute("data-act"), +btn.getAttribute("data-id")); };
    });
    Array.prototype.forEach.call(document.querySelectorAll(".doc-name"), function (n) {
      n.onclick = function () {
        var id = +n.getAttribute("data-open");
        var st = n.getAttribute("data-st");
        if (st === "draft" || !st) openEditor(id); else openTrack(id);
      };
    });
  }
  // Load-failure card (NOT the true-empty state): a non-401 failure/network drop must never render
  // "No documents yet" — that would falsely tell a paying user their documents vanished.
  function renderDashboardError() {
    h(
      topbar(true) +
      '<div class="wrap">' +
        '<div class="page-head"><div><div class="page-eyebrow">Lifted Sign</div>' +
          '<h1 class="page-title">Your documents</h1></div></div>' +
        '<div class="ap-card ap-empty ap-empty--rich" role="alert">' +
          '<div class="ap-empty__ic">' + icDoc() + "</div>" +
          '<h2 class="ap-empty__h">Couldn\'t load your documents</h2>' +
          '<p class="ap-empty__body">Check your connection and try again.</p>' +
          '<button class="ap-btn ap-btn--primary" id="dash-retry" style="margin-top:14px">Retry</button>' +
        "</div>" +
      "</div>"
    );
    wireTopbar();
    el("dash-retry").onclick = renderDashboard;
  }

  async function renderDashboard() {
    state._view = "docs";
    clearTrackPoll();
    _uploading = false; // release the upload guard on (re)entry — a prior upload navigated to the editor
    h(topbar(true) + '<div class="wrap"><div class="center"><div class="spin"></div></div></div>');
    wireTopbar();
    var r = await api("/api/mysign/agreements?limit=100");
    if (r.status === 401) return renderLanding("login");
    // Only treat a genuinely-successful fetch as authoritative. A network drop or non-401 error
    // must NOT fall through to an empty list (see renderDashboardError).
    if (r.netError || (!r.ok && r.status !== 401)) return renderDashboardError();
    var docs = (r.data && r.data.agreements) || [];
    // Preserve the current search/filter across refetches (e.g. after an action re-renders).
    var prev = state.dash || {};
    state.dash = { docs: docs, search: prev.search || "", filter: prev.filter || "all" };
    h(
      topbar(true) +
      '<div class="wrap">' +
        '<div class="page-head">' +
          '<div><div class="page-eyebrow">Lifted Sign</div>' +
            '<h1 class="page-title">Your documents</h1>' +
            '<div class="page-sub">' + docs.length + (docs.length === 1 ? " document" : " documents") + "</div></div>" +
          '<label class="ap-btn ap-btn--primary newdoc" id="newdoc-btn" role="button" tabindex="0" style="cursor:pointer">' + icPlus() + " New document" +
            '<input type="file" accept="application/pdf" id="up-file" class="hidden"></label>' +
        "</div>" +
        // Unverified password accounts: send is blocked until they confirm their email.
        (state.account && !state.account.email_verified && !state.account.is_google
          ? '<div class="verify-banner"><span>Confirm your email to start sending documents. ' +
            'Check your inbox for the link.</span> <button class="ap-btn ap-btn--ghost ap-btn--sm" id="dash-resend-verify">Resend</button></div>'
          : "") +
        '<div class="err" id="dash-err" role="alert"></div>' +
        // KPI summary + search/filter only when there ARE documents (empty accounts get the rich CTA).
        (docs.length
          ? dashKpisHtml(docs) + dashToolbarHtml() + '<div id="dash-list">' + dashListHtml() + "</div>"
          : '<div class="ap-card ap-empty ap-empty--rich firstrun">' +
              '<div class="ap-empty__ic">' + icDoc() + "</div>" +
              '<h2 class="ap-empty__h">Send your first document for signature</h2>' +
              '<p class="ap-empty__body">Upload a PDF, drop in signature fields, add your signers, and send it off — legally binding and audit-trailed. Free during beta, no card required.</p>' +
              '<div class="firstrun__steps" aria-hidden="true">' +
                '<span class="firstrun__step"><span class="firstrun__n">1</span> Upload a PDF</span>' +
                '<span class="firstrun__step"><span class="firstrun__n">2</span> Place signature fields</span>' +
                '<span class="firstrun__step"><span class="firstrun__n">3</span> Send for signature</span>' +
              "</div>" +
              '<div class="ap-empty__acts">' +
                '<button type="button" class="ap-btn ap-btn--primary" id="empty-upload">' + icPlus() + " Upload a PDF</button>" +
              "</div>" +
            "</div>") +
      "</div>"
    );
    wireTopbar();
    el("up-file").onchange = uploadDoc;
    // First-run empty-state CTA re-uses the single hidden #up-file picker (same upload flow).
    if (el("empty-upload")) el("empty-upload").onclick = function () { if (_uploading) return; el("up-file").click(); };
    // Keyboard-operable upload: the file input is display:none (out of tab order), so the styled
    // label carries role=button/tabindex and Enter/Space triggers the hidden input's picker.
    var nd = el("newdoc-btn");
    if (nd) nd.onkeydown = function (ev) {
      if (_uploading) return;
      if (ev.key === "Enter" || ev.key === " ") { ev.preventDefault(); el("up-file").click(); }
    };
    if (el("dash-resend-verify")) el("dash-resend-verify").onclick = async function () {
      this.disabled = true;
      var rr = await api("/api/sign-portal/auth/resend-verify", { method: "POST", json: {} });
      this.disabled = false;
      toast(rr.ok ? "Verification email sent — check your inbox." : "Couldn't send the email — please try again.", rr.ok ? undefined : { error: true });
    };
    if (el("dash-search")) el("dash-search").oninput = function () {
      state.dash.search = this.value;
      paintDashList();
    };
    Array.prototype.forEach.call(document.querySelectorAll("[data-filter]"), function (b) {
      b.onclick = function () { state.dash.filter = b.getAttribute("data-filter"); paintDashList(); };
    });
    wireDashRows();
  }

  function rowActions(d) {
    var out = [];
    var s = d.status;
    if (s === "draft") {
      out.push(actBtn("edit", d.id, "Edit", "ap-btn--primary"));
      out.push(actBtn("delete", d.id, "Delete"));
    } else if (s === "out_for_signature" || s === "sent" || s === "viewed") {
      out.push(actBtn("track", d.id, "Track"));
      out.push(actBtn("remind", d.id, "Remind"));
      out.push(actBtn("void", d.id, "Void", "ap-btn--danger"));
    } else if (s === "completed") {
      out.push(actBtn("track", d.id, "Track"));
      out.push(actBtn("download", d.id, "Download"));
    } else {
      out.push(actBtn("track", d.id, "View"));
    }
    return out.join("") || '<span class="muted" style="font-size:12.5px">—</span>';
  }
  function actBtn(act, id, label, extra) {
    return '<button class="ap-btn ap-btn--sm ' + (extra || "ap-btn--ghost") + '" data-act="' + act + '" data-id="' + id + '">' + label + "</button>";
  }

  // Re-entry guard: a fast double-pick (or picking again while the first upload is in flight) must
  // not POST twice and create two drafts. Paired with a visible busy state on the New-document button.
  var _uploading = false;
  var MAX_UPLOAD_BYTES = 25 * 1024 * 1024; // 25 MB — friendly client guard before the round-trip
  function setDashErr(txt) { var n = el("dash-err"); if (n) n.textContent = txt; }
  function restoreNewdoc(nd, html) {
    _uploading = false;
    if (!nd) return;
    nd.setAttribute("tabindex", "0");
    nd.removeAttribute("aria-disabled");
    nd.style.pointerEvents = "";
    nd.style.opacity = "";
    if (html != null) nd.innerHTML = html;
    var f = el("up-file"); if (f) f.onchange = uploadDoc; // re-bind the fresh input
  }
  async function uploadDoc(e) {
    var f = e.target.files && e.target.files[0];
    if (!f) return;
    if (_uploading) { e.target.value = ""; return; } // in-flight → ignore the extra pick
    if (f.size > MAX_UPLOAD_BYTES) {
      e.target.value = "";
      setDashErr("That PDF is larger than 25 MB — please upload a smaller file.");
      return;
    }
    _uploading = true;
    setDashErr("");
    // Busy state on the styled label: spinner + "Uploading…", non-interactive + out of tab order.
    var nd = el("newdoc-btn"), ndHtml = nd ? nd.innerHTML : null;
    if (nd) {
      nd.setAttribute("aria-disabled", "true");
      nd.setAttribute("tabindex", "-1");
      nd.style.pointerEvents = "none";
      nd.style.opacity = "0.65";
      nd.innerHTML = '<span class="spin" style="width:16px;height:16px;border-width:2px" aria-hidden="true"></span> Uploading…' +
        '<input type="file" accept="application/pdf" id="up-file" class="hidden">';
    }
    var fd = new FormData();
    fd.append("file", f);
    fd.append("name", f.name);
    e.target.value = "";  // allow re-selecting the same file after an error
    var r;
    try {
      r = await fetch("/api/mysign/agreements", { method: "POST", body: fd, credentials: "same-origin" });
    } catch (er) {
      restoreNewdoc(nd, ndHtml);
      setDashErr("You appear to be offline — check your connection and try again.");
      return;
    }
    var data = null; try { data = await r.json(); } catch (er) {}
    if (r.ok && data && data.ok && data.id) return openEditor(data.id); // navigates away; guard released on next dashboard render
    restoreNewdoc(nd, ndHtml);
    // Surface the server's real reason (not a PDF / password-protected / corrupt / too large).
    var msg = (data && data.error) || "";
    setDashErr(
      msg === "not a PDF" ? "That file isn't a PDF."
      : msg ? msg.charAt(0).toUpperCase() + msg.slice(1) + "."
      : "Upload failed — please try again.");
  }

  // In-flight lock for Remind (shared by dashboard rows + the track view) so a double-click can't
  // fire two reminder emails. Keyed by agreement id.
  var _remindLock = {};
  function setRemindDisabled(sel, on) {
    Array.prototype.forEach.call(document.querySelectorAll(sel), function (b) { b.disabled = on; });
  }
  async function remindDoc(id, after) {
    if (_remindLock[id]) return;              // one click = one reminder
    _remindLock[id] = true;
    setRemindDisabled('[data-act="remind"][data-id="' + id + '"],[data-tk="remind"]', true);
    var r = await api("/api/mysign/agreements/" + id + "/remind", { method: "POST", json: {} });
    delete _remindLock[id];
    if (r.netError) {
      setRemindDisabled('[data-act="remind"][data-id="' + id + '"],[data-tk="remind"]', false);
      return toast("You appear to be offline — check your connection and try again.", { error: true });
    }
    if (r.status === 403 && r.data && r.data.error === "subscription_inactive") return renderAccount("Your subscription is inactive — reactivate to send.");
    var ok = r.ok && r.data && r.data.ok;
    toast(ok ? "Reminder sent to " + ((r.data && r.data.emailed) || 0) + " signer(s)." : "Couldn't send the reminder.", ok ? undefined : { error: true });
    if (after) after();
  }

  async function docAction(act, id) {
    if (act === "edit") return openEditor(id);
    if (act === "track") return openTrack(id);
    if (act === "download") { window.open("/api/mysign/agreements/" + id + "/download", "_blank"); return; }
    if (act === "remind") return remindDoc(id, renderDashboard);
    if (act === "delete") {
      if (!window.confirm("Delete this draft? This can't be undone.")) return;
      var dr = await api("/api/mysign/agreements/" + id, { method: "DELETE" });
      if (dr.netError) return toast("You appear to be offline — check your connection and try again.", { error: true });
      if (dr.ok && dr.data && dr.data.ok) { toast("Draft deleted."); return renderDashboard(); }
      return toast(dr.data && dr.data.error === "locked"
        ? "This document was already sent — void it instead of deleting." : "Couldn't delete the draft.", { error: true });
    }
    if (act === "void" && !window.confirm("Void this document? Signers can no longer sign it.")) return;
    var r = await api("/api/mysign/agreements/" + id + "/" + act, { method: "POST", json: {} });
    if (r.netError) return toast("You appear to be offline — check your connection and try again.", { error: true });
    if (r.status === 403 && r.data && r.data.error === "subscription_inactive") return renderAccount("Your subscription is inactive — reactivate to send.");
    if (act === "void") toast(r.ok && r.data && r.data.ok ? "Document voided." : "Couldn't void the document.");
    renderDashboard();
  }

  // --- Developer API keys (Account view) ------------------------------------
  // Session-authed only (you can't mint a key with a key). The raw secret is returned by the
  // create endpoint exactly ONCE — showKeyOnce() surfaces it in a copy-now callout; after that
  // only the non-secret prefix is ever shown. Revoke is owner-scoped + instant.
  // "New template" = upload a PDF → create a draft → auto-detect prefill fields → open the editor
  // so the sender can add a signature, tweak, and "Save as template".
  async function newTemplateFromUpload(ev) {
    var f = ev.target.files && ev.target.files[0];
    ev.target.value = "";
    if (!f) return;
    if (f.size > MAX_UPLOAD_BYTES) { toast("That PDF is larger than 25 MB.", { error: true }); return; }
    var btn = el("btn-tpl-new");
    if (btn) { btn.disabled = true; btn.textContent = "Uploading…"; }
    var fd = new FormData();
    fd.append("file", f);
    fd.append("name", f.name.replace(/\.pdf$/i, "") + " template");
    var r;
    try {
      r = await fetch("/api/mysign/agreements", { method: "POST", body: fd, credentials: "same-origin" });
    } catch (e) {
      if (btn) { btn.disabled = false; btn.innerHTML = icPlus() + " New template"; }
      toast("Upload failed — check your connection.", { error: true });
      return;
    }
    var data = null; try { data = await r.json(); } catch (e) {}
    if (!(r.ok && data && data.ok && data.id)) {
      if (btn) { btn.disabled = false; btn.innerHTML = icPlus() + " New template"; }
      toast((data && data.error) ? data.error : "Couldn't upload that PDF.", { error: true });
      return;
    }
    await api("/api/mysign/agreements/" + data.id + "/detect", { method: "POST", json: {} });  // best-effort auto-fields
    return openEditor(data.id);
  }

  async function loadTemplates() {
    var box = el("tpl-body");
    if (!box) return;                                   // account view was left before the fetch
    var r = await api("/api/mysign/templates");
    box = el("tpl-body");
    if (!box) return;                                   // navigated away mid-flight
    if (r.status === 401) return renderLanding("login");
    if (!(r.ok && r.data)) {
      box.innerHTML = '<p class="acct-note acct-note--err" role="alert" style="margin:12px 0 0">Couldn\'t load templates — refresh to try again.</p>';
      return;
    }
    var tpls = r.data.templates || [];
    state.templates = {};                                 // stash id -> template (carries fields) for the questionnaire
    tpls.forEach(function (t) { state.templates[t.id] = t; });
    if (!tpls.length) {
      box.innerHTML = '<p class="keys-empty">No templates yet — open a document and choose &ldquo;Save as template&rdquo;.</p>';
      return;
    }
    box.innerHTML = '<div class="keys-list">' + tpls.map(tplRowHtml).join("") + "</div>";
    var uses = box.querySelectorAll("[data-tpl-use]");
    for (var i = 0; i < uses.length; i++) uses[i].onclick = onUseTemplate;
    var arch = box.querySelectorAll("[data-tpl-arch]");
    for (var j = 0; j < arch.length; j++) arch[j].onclick = onArchiveTemplate;
  }

  function tplRowHtml(t) {
    var sn = t.signer_n || 0, fn = t.field_n || 0;
    var meta = sn + " signer" + (sn === 1 ? "" : "s") + " · " + fn + " field" + (fn === 1 ? "" : "s") +
      (t.page_n ? " · " + t.page_n + " page" + (t.page_n === 1 ? "" : "s") : "");
    return (
      '<div class="key-row">' +
        '<div class="key-row__main">' +
          '<div class="key-row__top"><span class="key-row__label">' + esc(t.name || "Untitled template") + "</span></div>" +
          '<div class="key-row__meta"><span>' + meta + "</span></div>" +
        "</div>" +
        '<span style="display:inline-flex;gap:8px">' +
          '<button class="ap-btn ap-btn--primary ap-btn--sm" data-tpl-use="' + esc(t.id) + '">Use</button>' +
          '<button class="ap-btn ap-btn--ghost ap-btn--sm" data-tpl-arch="' + esc(t.id) + '" data-name="' + esc(t.name || "this template") + '">Archive</button>' +
        "</span>" +
      "</div>"
    );
  }

  // Build the questionnaire from a template's prefill fields. Dedup by field_key (ask once), but
  // remember EVERY field index that key fills so one answer pre-fills all its occurrences.
  function templateQuestions(t) {
    var fields = (t && t.fields) || [];
    var byKey = {}, order = [];
    fields.forEach(function (f, i) {
      if (!f.prefill) return;
      var key = f.field_key || ("field_" + i);
      if (!byKey[key]) { byKey[key] = { prompt: f.prompt || f.placeholder || SG_LABEL[f.type] || key, type: f.type, indices: [] }; order.push(key); }
      byKey[key].indices.push(i);
    });
    return order.map(function (k) { return byKey[k]; });
  }

  async function instantiateTemplate(tid, answers, useBtn) {
    var res = await api("/api/mysign/templates/" + tid + "/use", { method: "POST", json: answers ? { answers: answers } : {} });
    if (res.data && res.data.ok && res.data.id) return openEditor(res.data.id);  // straight into the prefilled draft
    if (useBtn) useBtn.disabled = false;
    toast("Couldn't create a document from this template.");
  }

  async function onUseTemplate(ev) {
    var b = ev.currentTarget;
    var tid = b.getAttribute("data-tpl-use");
    var t = state.templates && state.templates[tid];
    var qs = templateQuestions(t);
    b.disabled = true;
    if (!qs.length) return instantiateTemplate(tid, null, b);   // no prefill fields → straight in
    b.disabled = false;                                          // the modal owns the flow now
    openTemplateQuestionnaire(t, qs, function (answers) { instantiateTemplate(tid, answers, null); });
  }

  function openTemplateQuestionnaire(t, qs, onSubmit) {
    var inputType = function (ty) { return ty === "date" ? "date" : ty === "email" ? "email" : "text"; };
    var body = '<p class="muted" style="margin:0 0 12px">Fill in the details you use each time — we\'ll pre-fill them into the document.</p>' +
      qs.map(function (q, qi) {
        return '<label class="sg-plabel">' + esc(q.prompt) +
          '<input class="ap-input" id="tq-' + qi + '" type="' + inputType(q.type) + '" autocomplete="off"></label>';
      }).join("");
    var scrim = document.createElement("div");
    scrim.className = "sg-scrim"; scrim.id = "sg-scrim";
    scrim.innerHTML =
      '<div class="sg-modal" role="dialog" aria-modal="true" aria-label="Fill in template details" tabindex="-1">' +
        "<h2>" + esc(t.name || "New document") + "</h2>" + body +
        '<div class="row" style="justify-content:flex-end;margin-top:18px">' +
          '<button class="ap-btn ap-btn--ghost" id="tq-skip">Skip</button>' +
          '<button class="ap-btn ap-btn--primary" id="tq-go">Create document</button>' +
        "</div>" +
      "</div>";
    modalOpener = document.activeElement;
    document.body.appendChild(scrim);
    scrim.addEventListener("click", function (ev) { if (ev.target === scrim) closeModal(); });
    modalKeyHandler = function (ev) {
      if (ev.key === "Escape") { closeModal(); return; }
      if (ev.key === "Tab") {
        var f = Array.prototype.filter.call(scrim.querySelectorAll('button, input, [tabindex]:not([tabindex="-1"])'),
          function (n) { return !n.disabled && n.offsetParent !== null; });
        if (!f.length) return;
        var first = f[0], last = f[f.length - 1];
        if (ev.shiftKey && document.activeElement === first) { ev.preventDefault(); last.focus(); }
        else if (!ev.shiftKey && document.activeElement === last) { ev.preventDefault(); first.focus(); }
      }
    };
    document.addEventListener("keydown", modalKeyHandler);
    (el("tq-0") || el("tq-go") || scrim.querySelector(".sg-modal")).focus();
    function collect() {
      var answers = {};
      qs.forEach(function (q, qi) {
        var v = el("tq-" + qi) ? el("tq-" + qi).value : "";
        q.indices.forEach(function (idx) { answers[String(idx)] = v; });
      });
      return answers;
    }
    el("tq-go").onclick = function () { var a = collect(); closeModal(); onSubmit(a); };
    el("tq-skip").onclick = function () { closeModal(); onSubmit(null); };  // create without prefilling
  }

  async function onArchiveTemplate(ev) {
    var b = ev.currentTarget;
    if (!window.confirm("Archive “" + (b.getAttribute("data-name") || "this template") + "”?")) return;
    var res = await api("/api/mysign/templates/" + b.getAttribute("data-tpl-arch") + "/archive", { method: "POST", json: {} });
    if (res.data && res.data.ok) { toast("Template archived."); return loadTemplates(); }
    toast("Couldn't archive the template.");
  }

    var btns = box.querySelectorAll("[data-revoke]");
    for (var i = 0; i < btns.length; i++) btns[i].onclick = onRevokeKey;

  function keyRowHtml(k) {
    var mode = k.mode === "test" ? "test" : "live";
    var last = k.last_used_at ? "Last used " + esc(fmtDate(k.last_used_at)) : "Never used";
    return (
      '<div class="key-row">' +
        '<div class="key-row__main">' +
          '<div class="key-row__top">' +
            '<span class="key-row__label">' + esc(k.label || "Untitled key") + "</span>" +
            '<span class="ap-badge ' + (mode === "test" ? "ap-badge--plain" : "ap-badge--info") + ' key-mode">' + mode + "</span>" +
          "</div>" +
          '<div class="key-row__meta">' +
            '<code class="key-prefix">' + esc(k.prefix || "") + "…</code>" +
            '<span class="key-dot">·</span><span>' + last + "</span>" +
            '<span class="key-dot">·</span><span>Created ' + esc(fmtDate(k.created_at)) + "</span>" +
          "</div>" +
        "</div>" +
        '<button class="ap-btn ap-btn--danger ap-btn--sm" data-revoke="' + esc(k.id) +
          '" data-label="' + esc(k.label || "this key") + '">Revoke</button>' +
      "</div>"
    );
  }

  async function onRevokeKey() {
    var id = this.getAttribute("data-revoke");
    var label = this.getAttribute("data-label") || "this key";
    if (!window.confirm("Revoke “" + label + "”? Any backend using this key will stop working immediately. This can't be undone.")) return;
    this.disabled = true;
    var r = await api("/api/mysign/api-keys/" + encodeURIComponent(id) + "/revoke", { method: "POST", json: {} });
    if (r.ok && r.data && r.data.ok) { toast("API key revoked.", { type: "success" }); return loadApiKeys(); }
    this.disabled = false;
    toast("Couldn't revoke the key — please try again.", { type: "error" });
  }

  // Inline create form: label input + live/test segmented toggle. Toggles open/closed.
  function toggleKeyForm() {
    var host = el("keys-form");
    if (!host) return;
    if (host.firstChild) { host.innerHTML = ""; return; }   // already open → close
    var mode = "live";
    host.innerHTML =
      '<div class="keys-form">' +
        '<div class="keys-form__row">' +
          '<input class="ap-input" id="key-label" type="text" maxlength="60" placeholder="Label (e.g. Production server)" autocomplete="off">' +
          '<div class="keys-seg" role="group" aria-label="Key mode">' +
            '<button type="button" id="key-mode-live" class="is-on">Live</button>' +
            '<button type="button" id="key-mode-test">Test</button>' +
          "</div>" +
        "</div>" +
        '<div class="keys-form__actions">' +
          '<button class="ap-btn ap-btn--primary ap-btn--sm" id="key-create">Create key</button>' +
          '<button class="ap-btn ap-btn--ghost ap-btn--sm" id="key-cancel">Cancel</button>' +
        "</div>" +
      "</div>";
    var live = el("key-mode-live"), test = el("key-mode-test");
    live.onclick = function () { mode = "live"; live.classList.add("is-on"); test.classList.remove("is-on"); };
    test.onclick = function () { mode = "test"; test.classList.add("is-on"); live.classList.remove("is-on"); };
    el("key-cancel").onclick = function () { host.innerHTML = ""; };
    var input = el("key-label");
    if (input) input.focus();
    el("key-create").onclick = async function () {
      var label = ((input && input.value) || "").trim();
      this.disabled = true;
      var r = await api("/api/mysign/api-keys", { method: "POST", json: { label: label, mode: mode } });
      if (r.ok && r.data && r.data.ok && r.data.key) {
        host.innerHTML = "";
        showKeyOnce(r.data.key, r.data.meta || {});
        loadApiKeys();
        return;
      }
      this.disabled = false;
      toast("Couldn't create the key — please try again.", { type: "error" });
    };
  }

  // The raw secret is shown ONCE. Copy button + explicit "save it now" warning; on dismiss the
  // callout is removed and only the prefix persists in the list.
  function showKeyOnce(raw, meta) {
    var host = el("keys-reveal");
    if (!host) return;
    host.innerHTML =
      '<div class="key-reveal" role="alert">' +
        '<div class="key-reveal__title">' + icLock() + "Save this key now" + "</div>" +
        '<p class="key-reveal__note">This is the only time we’ll show your API key. Copy it into your secret manager — you won’t be able to see it again. If you lose it, revoke it and create a new one.</p>' +
        '<div class="key-reveal__box">' +
          '<span class="key-reveal__val" id="key-raw"></span>' +
        "</div>" +
        '<div class="key-reveal__actions">' +
          '<button class="ap-btn ap-btn--primary ap-btn--sm" id="key-copy">Copy key</button>' +
          '<button class="ap-btn ap-btn--ghost ap-btn--sm" id="key-done">I’ve saved it</button>' +
        "</div>" +
      "</div>";
    el("key-raw").textContent = raw;                    // textContent, never innerHTML — no injection
    el("key-copy").onclick = function () {
      var btn = this;
      function ok() { btn.textContent = "Copied ✓"; toast("API key copied to clipboard.", { type: "success" }); setTimeout(function () { if (btn) btn.textContent = "Copy key"; }, 1800); }
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(raw).then(ok, function () { legacyCopy(raw); ok(); });
      } else { legacyCopy(raw); ok(); }
    };
    el("key-done").onclick = function () { host.innerHTML = ""; };
    var box = el("keys-body");
    if (box && box.scrollIntoView) box.scrollIntoView({ behavior: "smooth", block: "nearest" });
  }

  // Clipboard fallback for older/insecure contexts (navigator.clipboard needs HTTPS + gesture).
  function legacyCopy(text) {
    try {
      var ta = document.createElement("textarea");
      ta.value = text; ta.setAttribute("readonly", "");
      ta.style.position = "fixed"; ta.style.top = "-1000px";
      document.body.appendChild(ta); ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
    } catch (e) { /* copy unavailable — user can still select the visible value manually */ }
  }

  // Two-step SMS-2FA enrollment: enter phone → receive code → verify → armed.
  // Google Authenticator (TOTP) enrollment — the account's optional second factor. Enroll mints a
  // pending secret (server stashes it in a signed cookie); the account confirms with a live code
  // before it is persisted, so an unconfirmed secret is never armed.
  async function render2faSetup() {
    var r = await api("/api/sign-portal/auth/totp/enroll", { method: "POST", json: {} });
    if (!(r.ok && r.data && r.data.secret)) return renderAccount("Couldn't start 2FA setup — try again.", "err");
    var secret = r.data.secret, qr = r.data.qr || "";
    function draw(err) {
      h(
        topbar(true) +
        '<div class="wrap"><div class="page-head"><div><div class="page-eyebrow">Lifted Sign</div>' +
          '<h1 class="page-title">Turn on two-factor</h1></div></div>' +
          '<div class="ap-card authcard" style="max-width:420px">' +
          '<p class="authcard__sub">Scan this with Google Authenticator (or any authenticator app), then enter the 6-digit code it shows.</p>' +
          (qr ? '<img src="' + esc(qr) + '" alt="Two-factor QR code" width="184" height="184" style="display:block;margin:14px auto;border-radius:12px;background:#fff;padding:8px">' : "") +
          '<p class="muted" style="text-align:center;font-family:var(--font-mono);font-size:12px;word-break:break-all;margin:0 0 12px">Can\'t scan? Enter this key: <b>' + esc(secret) + "</b></p>" +
          '<div class="fld"><input class="ap-input" id="tf-scode" inputmode="numeric" pattern="[0-9]*" maxlength="8" placeholder=" " autocomplete="one-time-code"><label for="tf-scode">6-digit code</label></div>' +
          '<div class="err" id="tf-serr" role="alert">' + (err || "") + "</div>" +
          '<button class="ap-btn ap-btn--primary" id="tf-confirm" style="width:100%">Verify &amp; turn on</button>' +
          '<button class="li-forgot" type="button" id="tf-cancel" style="margin-top:10px">Cancel</button>' +
          "</div></div>"
      );
      wireTopbar();
      el("tf-cancel").onclick = function () { renderAccount(); };
      el("tf-confirm").onclick = async function () {
        el("tf-confirm").disabled = true;
        var c = await api("/api/sign-portal/auth/totp/confirm", { method: "POST", json: { code: (el("tf-scode").value || "").trim() } });
        el("tf-confirm").disabled = false;
        if (c.ok && c.data && c.data.ok) {
          var acc = await api("/api/mysign/account");
          if (acc.data && acc.data.account) state.account = acc.data.account;
          return renderAccount("Two-factor authentication is on.", "ok");
        }
        draw(c.data && c.data.error === "expired" ? "That setup step timed out — start again." : "That code didn't match — check it and try again.");
      };
    }
    draw("");
  }

  // --- compose / editor -----------------------------------------------------
  // Shown when the editor can't load its pages (fetch failed / 0 pages). Real error + Retry, never
  // the permanent fake "Rendering pages…" placeholder.
  function renderEditorError(aid, a) {
    var name = (a && a.name) || "Document";
    h(
      topbar(true) +
      '<div class="wrap sg-wrap">' +
        '<div class="sg-head">' +
          '<button class="ap-btn ap-btn--ghost ap-btn--sm" id="ed-err-back">&larr; Documents</button>' +
          "<h1>" + esc(name) + "</h1>" +
        "</div>" +
        '<div class="ap-card ap-empty ap-empty--rich" role="alert">' +
          '<div class="ap-empty__ic">' + icDoc() + "</div>" +
          '<h2 class="ap-empty__h">Couldn\'t open this document</h2>' +
          '<p class="ap-empty__body">We couldn\'t load its pages — check your connection and try again.</p>' +
          '<button class="ap-btn ap-btn--primary" id="ed-err-retry" style="margin-top:14px">Retry</button>' +
        "</div>" +
      "</div>"
    );
    wireTopbar();
    el("ed-err-retry").onclick = function () { openEditor(aid); };
    el("ed-err-back").onclick = renderDashboard;
  }

  async function openEditor(aid) {
    clearTrackPoll();
    h(topbar(true) + '<div class="wrap"><div class="center"><div class="spin"></div></div></div>');
    wireTopbar();
    var res = await Promise.all([
      api("/api/mysign/agreements/" + aid),
      api("/api/mysign/agreements/" + aid + "/pages")
    ]);
    var ar = res[0], pr = res[1];
    if (ar.status === 401 || pr.status === 401) return renderLanding("login");
    var a = ar.data;
    if (!a || a.error || !a.id) return renderDashboard();
    // Frozen after send — the editor mutators return {ok:false,"locked"}; route to track.
    if (a.status && a.status !== "draft") return openTrack(aid);
    var pages = (pr.data && pr.data.pages) || [];
    // A pages fetch that failed or returned nothing must NOT drop the user onto a permanent fake
    // "Rendering pages…" canvas — show a real error with Retry (re-opens the editor from scratch).
    if (pr.netError || !pr.ok || !pages.length) return renderEditorError(aid, a);
    var idIdx = {};
    (a.signers || []).forEach(function (s, i) { idIdx[s.id] = i; });
    state.editor = {
      aid: aid, agreement: a, pages: pages,
      signers: (a.signers && a.signers.length)
        ? a.signers.map(function (s) { return { id: s.id, name: s.name, email: s.email, order: s.sign_order }; })
        : [{ name: "", email: "", order: 1 }],
      items: (a.fields || []).map(function (f) {
        return {
          type: f.type, page: f.page, x: f.x, y: f.y, w: f.w, h: f.h,
          signer: (idIdx[f.signer_id] != null ? idIdx[f.signer_id] : 0),
          required: f.required !== 0, value: f.value || "", placeholder: f.placeholder || "",
          prefill: !!f.prefill, prompt: f.prompt || "", field_key: f.field_key || ""
        };
      }),
      activeSigner: 0, tool: "select", sel: null, msg: a.message || "", drag: null,
      // Signing order: 'sequential' (one at a time) | 'parallel' (everyone at once, default).
      orderMode: (a.order_mode === "sequential" ? "sequential" : "parallel"),
      // Redact tool (disjoint from `tool`): redact = mode on/off, rboxes = pending
      // redactions [{page,x,y,w,h,kind}], rdraw = in-flight draw gesture, rkind = fill.
      redact: false, rboxes: [], rdraw: null, rkind: "redact",
      // Add-text tool (disjoint from `tool` and `redact`): texting = mode on/off; txitems =
      // pending blocks [{page,x,y,text,size,font,color}] (x,y = top-left anchor, normalized
      // 0..1 — server bakes baseline at y*H+size); txedit = index open in the inline textarea;
      // txdraft = in-flight move gesture; txsize/txfont/txcolor = current controls.
      texting: false, txitems: [], txedit: null, txdraft: null, txsize: 12, txfont: "sans", txcolor: "#111111",
      // Edit-text tool (disjoint from tool/redact/texting): editing = mode on/off; edSpans[pi] =
      // backend runs [{i,x,y,w,h,oy,size,font,color,text}] cached per page; edSel = the run open in
      // the contenteditable overlay {pi,i,ed,mask,orig} (null when none open). Edits burn server-side
      // (whiteout + restamp) then a full re-fetch, so — like redact/add-text — there is no client array.
      editing: false, edSpans: {}, edSel: null,
      // Cache-buster for the /page/{n} PNGs: the URL is stable but the bytes change
      // after every page op. Bump to the new doc_hash so rotated/reordered thumbnails
      // + canvas refetch, while ordinary field re-renders keep the same URL (cache hit).
      pagesVersion: (a.doc_hash || Date.now()),
      // --- PDF.js hi-fi layer (additive; the PNG <img> is the base/fallback) ---
      pdfDoc: null, pdfDocVer: null, pdfMissVer: null, pdfGen: 0, pdfBitmaps: {}, pdfFailed: false, zoom: 1,
      // v2 text layer: pdfTexts = raw getTextContent per page (scale-independent, keyed by version);
      // pdfText = laid-out span HTML per page (scale-dependent, dropped with bitmaps on zoom).
      pdfTexts: {}, pdfText: {},
      // Undo/redo snapshot stack (page-content arrays only; signers excluded — they are live form
      // inputs). armHint: show the arm banner while a field type is armed. Both reset by histReset /
      // restoreHist and absent on a fresh document.
      history: [], histIdx: -1, histTag: null, histTagT: 0, armHint: false
    };
    histReset();                 // baseline = history[0] for the freshly loaded document
    renderEditor();
  }

  // ---- undo/redo history core (page-content arrays only) --------------------
  var HIST_MAX = 50;
  function histSnapshot() {
    var e = state.editor;
    return {
      items:   JSON.parse(JSON.stringify(e.items || [])),
      rboxes:  JSON.parse(JSON.stringify(e.rboxes || [])),
      txitems: JSON.parse(JSON.stringify(e.txitems || [])),
      // signers are snapshotted WITH items: items reference signers by index, so restoring one
      // without the other would desync (a field could point past the signers array -> silent
      // mis-attribution on send). Kept consistent here.
      signers: JSON.parse(JSON.stringify(e.signers || []))
    };
  }
  function histReset() {         // call once per loaded document (baseline)
    var e = state.editor; if (!e) return;
    e.history = [histSnapshot()]; e.histIdx = 0; e.histTag = null; e.histTagT = 0;
  }
  // tag = optional coalesce key (e.g. "nudge:3:mv"); same tag within 700ms extends the top entry
  // instead of pushing a new one, so a burst of arrow nudges collapses to ONE undo step.
  function pushHistory(tag) {
    var e = state.editor; if (!e) return;
    if (!e.history) histReset();
    var now = Date.now();
    if (tag && tag === e.histTag && (now - e.histTagT) < 700 && e.histIdx === e.history.length - 1) {
      e.history[e.histIdx] = histSnapshot();      // extend the current burst
    } else {
      e.history.length = e.histIdx + 1;           // drop any redo tail
      e.history.push(histSnapshot());
      if (e.history.length > HIST_MAX) e.history.shift();
      e.histIdx = e.history.length - 1;
    }
    e.histTag = tag || null; e.histTagT = now;
  }
  function restoreHist(snap) {
    var e = state.editor; if (!e || !snap) return;
    e.items   = JSON.parse(JSON.stringify(snap.items));
    e.rboxes  = JSON.parse(JSON.stringify(snap.rboxes));
    e.txitems = JSON.parse(JSON.stringify(snap.txitems));
    if (snap.signers) {                                    // restore signers WITH items (see histSnapshot)
      e.signers = JSON.parse(JSON.stringify(snap.signers));
      if (!e.signers.length) e.signers.push({ name: "", email: "", order: 1 });
      if (e.activeSigner == null || e.activeSigner >= e.signers.length) e.activeSigner = e.signers.length - 1;
    }
    e.sel = null; e.tool = "select"; e.armHint = false;   // land in a clean select state
    e.drag = null; e.rdraw = null; e.txdraft = null; e.txedit = null;
    e.editing = false; e.edSel = null;                    // leave edit mode too (peer of redact/add-text)
    e.dirty = true;
    renderEditor();
  }
  function undo() { var e = state.editor; if (!e || !e.history || e.histIdx <= 0) return; e.histIdx--; restoreHist(e.history[e.histIdx]); }
  function redo() { var e = state.editor; if (!e || !e.history || e.histIdx >= e.history.length - 1) return; e.histIdx++; restoreHist(e.history[e.histIdx]); }

  function hasNamedSigner() {
    return state.editor.signers.some(function (s) { return (s.name || "").trim() || (s.email || "").trim(); });
  }

  function signerListHtml() {
    var e = state.editor;
    return '<div class="sg-signers" role="list">' + e.signers.map(function (s, i) {
      var c = signerColor(i);
      var active = e.activeSigner === i;
      return '<div class="sg-signer' + (active ? " sg-signer-active" : "") + '" role="listitem" style="border-left-color:' + c + '">' +
        '<div class="sg-srow">' +
          '<span class="sg-swatch" style="background:' + c + '"></span>' +
          '<label class="sg-active-lbl"><input type="radio" name="sg-active" ' + (active ? "checked" : "") + ' data-active="' + i + '"> Assign new fields</label>' +
          (e.signers.length > 1 ? '<button class="sg-rm" data-rm="' + i + '" title="Remove signer">&times;</button>' : "") +
        "</div>" +
        '<input class="ap-input sg-sin" data-name="' + i + '" aria-label="Signer ' + (i + 1) + ' full name" placeholder="Full name" value="' + esc(s.name || "") + '">' +
        '<input class="ap-input sg-sin" data-email="' + i + '" type="email" aria-label="Signer ' + (i + 1) + ' email" placeholder="Email" value="' + esc(s.email || "") + '">' +
      "</div>";
    }).join("") + "</div>";
  }

  // Signing-order toggle — only meaningful with ≥2 signers (order needs multiple people). Draft-only
  // by construction (the editor is never entered for a sent doc). Reflects the agreement's order_mode.
  function orderToggleHtml() {
    var e = state.editor;
    if (e.signers.length < 2) return "";
    var seq = e.orderMode === "sequential";
    return '<div class="sg-order">' +
      '<div class="sg-order__seg" role="group" aria-label="Signing order">' +
        '<button type="button" class="' + (seq ? "" : "is-active") + '" aria-pressed="' + (seq ? "false" : "true") + '" data-order="parallel">Everyone at once</button>' +
        '<button type="button" class="' + (seq ? "is-active" : "") + '" aria-pressed="' + (seq ? "true" : "false") + '" data-order="sequential">Sign in order</button>' +
      "</div>" +
      '<p class="sg-order__hint">' + (seq
        ? "Each signer is invited only after the one before them signs."
        : "All signers are invited at the same time.") + "</p>" +
    "</div>";
  }
  async function setOrderMode(mode) {
    var e = state.editor;
    if (!e || mode === e.orderMode) return;
    setRemindDisabled("[data-order]", true); // reuse the generic disable helper (selector-based)
    var r = await api("/api/mysign/agreements/" + e.aid + "/order-mode", { method: "POST", json: { mode: mode } });
    if (r.netError) {
      setRemindDisabled("[data-order]", false);
      return toast("You appear to be offline — check your connection and try again.", { error: true });
    }
    if (r.ok && r.data && r.data.ok) {
      e.orderMode = r.data.order_mode === "sequential" ? "sequential" : "parallel";
      if (e.agreement) e.agreement.order_mode = e.orderMode;
      e.dirty = true;
      return renderEditor(); // repaint active state + hint
    }
    setRemindDisabled("[data-order]", false);
    toast("Couldn't change the signing order — please try again.", { error: true });
  }

  function paletteHtml() {
    var e = state.editor;
    var disabled = !hasNamedSigner() || e.redact || e.texting || e.editing; // redact/add-text/edit own the page; disarm fields
    return SG_FIELDS.map(function (f) {
      var armed = e.tool === f.type;
      return '<button class="sg-pal ap-chip' + (armed ? " sg-pal-armed" : "") + '"' +
        ' aria-pressed="' + (armed ? "true" : "false") + '"' +
        (disabled ? " disabled" : ' draggable="true"') + ' data-pal="' + f.type + '">' +
        '<span class="sg-pal-ic" aria-hidden="true">' + sgIcon(f.type) + "</span>" +
        '<span class="sg-pal-tx">' + esc(f.label) + "</span></button>";
    }).join("");
  }

  var PAL_HINT_ON = "Drag onto a page, or click to arm then click the page. New fields go to the selected signer.";
  var PAL_HINT_OFF = "Add a signer above to place fields.";
  // Toggle the palette's enabled/draggable state + hint in place (no re-render) so entering the
  // first signer's name/email doesn't blur the field the user is typing in.
  function refreshPalette() {
    var enabled = hasNamedSigner();
    Array.prototype.forEach.call(document.querySelectorAll(".sg-pal"), function (b) {
      b.disabled = !enabled;
      if (enabled) b.setAttribute("draggable", "true"); else b.removeAttribute("draggable");
    });
    var hint = document.querySelector(".sg-hint");
    if (hint) hint.textContent = enabled ? PAL_HINT_ON : PAL_HINT_OFF;
  }

  // Sticky, dismissible arm-hint banner at the top of the canvas — reinforces the Pass-4 keyboard
  // placement (mentions Enter) and offers Esc-to-cancel. Shows only while a field type is armed.
  function armHintHtml() {
    var e = state.editor;
    var armed = e.tool !== "select" && !e.redact && !e.texting && !e.editing;
    if (!armed || e.armHint === false) return "";
    var label = SG_LABEL[e.tool] || e.tool;
    return '<div class="sg-armbar" role="status">' +
      '<span class="sg-armdot" aria-hidden="true"></span>' +
      '<span class="sg-armtxt">Click a page or press <kbd>Enter</kbd> to place a <b>' + esc(label) + "</b> field</span>" +
      '<button type="button" class="sg-armx" id="sg-armx" title="Cancel (Esc)" aria-label="Cancel placing field">Esc &times;</button>' +
    "</div>";
  }

  function fieldBoxHtml(it, i) {
    var e = state.editor;
    var c = signerColor(it.signer);
    var sel = e.sel === i;
    var s = e.signers[it.signer] || {};
    var who = firstName(s.name || s.email || ("Signer " + (it.signer + 1)));
    return '<div class="sg-field' + (sel ? " sg-sel" : "") + (it.required === false ? " sg-opt" : "") + '" data-fi="' + i + '" ' +
      'tabindex="0" role="group" aria-label="' + esc((SG_LABEL[it.type] || it.type) + " field for " + who + ", arrow keys move, Ctrl+arrow resize, Delete removes") + '" ' +
      'style="left:' + (it.x * 100) + "%;top:" + (it.y * 100) + "%;width:" + (it.w * 100) + "%;height:" + (it.h * 100) + "%;" +
      "border-color:" + c + ";background:" + hexToRgba(c, 0.16) + ";color:" + c + '">' +
      '<span class="sg-ficon" aria-hidden="true">' + sgIcon(it.type) + "</span>" +
      '<span class="sg-flabel">' + esc(SG_LABEL[it.type] || it.type) + " · " + esc(who) + "</span>" +
      (sel ? '<button type="button" class="sg-del" data-del="' + i + '" aria-label="Delete field" title="Delete">&times;</button><span class="rz" data-rz="' + i + '" aria-hidden="true"></span>' : "") +
      "</div>";
