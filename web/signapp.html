  // ===== PDF.js paint pipeline =============================================================
  // renderEditor() rebuilds the whole editor DOM (app.innerHTML) on almost every interaction, so
  // the rendered page bitmaps are cached on the (persistent) editor object, keyed by backing-pixel
  // width. Each rebuild repaints the fresh canvases from cache (a synchronous drawImage — fast,
  // flicker-free); only a version change or a zoom that shifts the width bucket triggers a true
  // pdf.js re-render. On ANY failure the canvas is left blank+hidden and the PNG <img> shows.
  // v1 caps hi-fi rendering to reasonably-sized docs: every page stacks a DPR-scaled canvas, so a
  // very long doc would stack dozens on mobile and risk an OOM. Above the cap we stay on the
  // (lazy-loaded) PNG render — no fidelity loss vs today. TODO(v2): viewport-gated rendering
  // (IntersectionObserver) to lift the cap while bounding live canvases.
  var PDF_MAX_PAGES = 40;
  function mountPdfLayer() {
    var e = state.editor;
    if (!e || !e.pages.length || e.pdfFailed) return;
    if (e.pages.length > PDF_MAX_PAGES) return; // large doc → PNG-only (see PDF_MAX_PAGES note)
    if (e.pdfDoc && e.pdfDocVer === e.pagesVersion) { paintPdfLayer(); return; }
    initPdfDoc().then(function (doc) { if (doc) paintPdfLayer(); });
  }

  function paintPdfLayer() {
    var e = state.editor;
    if (!e || !e.pdfDoc) return;
    var dpr = window.devicePixelRatio || 1;
    Array.prototype.forEach.call(document.querySelectorAll(".sg-pdf-canvas"), function (canvas) {
      var pi = +canvas.getAttribute("data-pdfc");
      var pageEl = canvas.closest(".sg-page");
      if (!pageEl) return;
      var cssW = pageEl.clientWidth;
      if (!cssW) return; // not laid out yet
      var targetW = Math.round(cssW * dpr); // crisp backing store
      // v2 text layer — self-gates to select mode; own async. Fire-and-forget with a catch so an
      // unforeseen pre-try throw can't surface as an unhandledrejection (it's internally guarded).
      renderTextLayerIfSelect(pi, pageEl, cssW).catch(function () {});
      var cached = e.pdfBitmaps[pi];
      if (cached && cached.w === targetW && cached.bmp) { drawBitmap(canvas, cached.bmp, pageEl); return; }
      renderPdfPage(pi, canvas, pageEl, targetW);
    });
  }

  async function renderPdfPage(pi, canvas, pageEl, targetW) {
    var e = state.editor, gen = e.pdfGen, doc = e.pdfDoc;
    if (!doc) return;
    var page;
    try { page = await doc.getPage(pi + 1); } catch (_) { return; } // 1-based
    if (state.editor !== e || e.pdfGen !== gen) return;
    var base = page.getViewport({ scale: 1 }); // PDF points == page_info w/h; no rotation override
    var vp = page.getViewport({ scale: targetW / base.width }); // device-px backing
    var off = document.createElement("canvas");
    off.width = Math.round(vp.width); off.height = Math.round(vp.height);
    try {
      await page.render({ canvasContext: off.getContext("2d"), viewport: vp, background: "rgb(255,255,255)" }).promise;
    } catch (_) { return; } // render throw → PNG stays
    if (state.editor !== e || e.pdfGen !== gen) return;
    var bmp;
    try { bmp = await createImageBitmap(off); } catch (_) { bmp = off; }
    e.pdfBitmaps[pi] = { w: targetW, bmp: bmp };
    if (state.editor === e && e.pdfGen === gen) drawBitmap(canvas, bmp, pageEl);
  }

  function drawBitmap(canvas, bmp, pageEl) {
    if (canvas.width !== bmp.width) canvas.width = bmp.width;
    if (canvas.height !== bmp.height) canvas.height = bmp.height;
    var ctx = canvas.getContext("2d");
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(bmp, 0, 0);
    pageEl.classList.add("sg-pdf-on"); // opaque canvas painted → NOW hide the PNG
  }

  // ---- v2 selectable text layer (additive; invisible spans over the canvas glyphs) ------------
  // Built ONLY in select mode, keyed to (page, version, css-width). getTextContent (worker round-
  // trip) is cached scale-free in pdfTexts; the laid-out span HTML is cached scale-keyed in pdfText
  // so the frequent renderEditor rebuilds re-inject instantly (no worker, no re-layout). A build
  // token makes stale async completions no-op so racing rebuilds can't double the spans. Never
  // throws — on any failure the div is left empty and the canvas/PNG are untouched.
  //
  // Scale discipline (the alignment invariant): the canvas backing is cssW*dpr DEVICE px shown at
  // width:100%; the text layer lives in CSS px, so its scale is cssW/base.width (NO dpr) and the
  // container's --scale-factor MUST equal that (v4 TextLayer multiplies every glyph pos by it).
  async function renderTextLayerIfSelect(pi, pageEl, cssW) {
    var e = state.editor;
    if (!e || !e.pdfDoc) return;
    var td = pageEl.querySelector(".sg-pdf-text");
    if (!td) return;
    if (!(e.tool === "select" && !e.redact && !e.editing)) { if (td.firstChild) td.textContent = ""; return; } // mode gate
    if (!_pdfLib || !_pdfLib.TextLayer || !(cssW > 0)) return;
    var gen = e.pdfGen, ver = e.pdfDocVer, wkey = Math.round(cssW);
    // Fast path: this page was already laid out at this version+width — re-inject cached spans.
    e.pdfText = e.pdfText || {};
    var hit = e.pdfText[pi];
    if (hit && hit.ver === ver && hit.w === wkey && hit.html) {
      if (td.firstChild) return; // already populated this render
      td.style.setProperty("--scale-factor", hit.scale);
      td.innerHTML = hit.html;
      return;
    }
    var token = (e._pdftSeq = (e._pdftSeq || 0) + 1);
    td.dataset.pdftBuild = token; // newest build for this div wins; stale completions bail
    var page;
    try { page = await e.pdfDoc.getPage(pi + 1); } catch (_) { return; } // memoized proxy
    if (state.editor !== e || e.pdfGen !== gen || td.dataset.pdftBuild != token) return;
    e.pdfTexts = e.pdfTexts || {};
    var tc = e.pdfTexts[pi];
    if (!tc || tc._ver !== ver) {
      try { tc = await page.getTextContent(); } catch (_) { return; } // scanned/image page → no text
      if (state.editor !== e || e.pdfGen !== gen || e.pdfDocVer !== ver) return;
      tc._ver = ver; e.pdfTexts[pi] = tc;
    }
    if (td.dataset.pdftBuild != token || !td.isConnected) return; // superseded / DOM wiped mid-await
    var base = page.getViewport({ scale: 1 });          // PDF-point dims (same basis as the canvas)

  // size/pageHeightPt * the page's rendered pixel height. Set px font-size per box so the
  // preview matches the baked output at any zoom. (Re-run after zoom.)
  function txSyncFontSizes() {
    var e = state.editor;
    if (!e || !e.texting) return;
    Array.prototype.forEach.call(document.querySelectorAll(".sg-tx-box, .sg-tx-input"), function (n) {
      var raw = n.getAttribute("data-txbox") != null ? n.getAttribute("data-txbox") : n.getAttribute("data-txin");
      var it = e.txitems[+raw]; if (!it) return;
      var pageEl = n.closest(".sg-page"), pg = e.pages[it.page];
      if (!pageEl || !pg || !+pg.h || !pageEl.clientHeight) return;
      n.style.fontSize = (it.size / (+pg.h) * pageEl.clientHeight) + "px";
    });
  }
  async function applyTexts() {
    var e = state.editor;
    txCommitEdit();
    if (e.sending || !e.txitems.length) return;
    setEditorBusy(true);
    try {
      var items = e.txitems.map(function (t) {
        return { page: t.page, x: t.x, y: t.y, text: t.text, size: t.size, font: t.font, color: t.color };
      });
      var r = await api("/api/mysign/agreements/" + e.aid + "/text", { method: "POST", json: { items: items } });
      if (r.status === 401) return renderLanding("login");
      if (!r.ok || !r.data || r.data.ok === false) {
        var msg = (r.data && r.data.error) || "";
        return toast(msg.indexOf("locked") === 0 ? "This document was already sent."
          : msg.indexOf("unsupported characters:") === 0 ? "Some characters can't be added: " + msg.slice(24)
          : msg.indexOf("runs off the bottom") === 0 ? "That text " + msg + " — move it up or shrink it."
          : msg.indexOf("control characters") >= 0 ? "That text contains control characters — remove them and retry."
          : "Couldn't add the text.", { error: true });
      }
      e.txitems = []; e.texting = false; e.txedit = null;
      await openEditor(e.aid);                 // re-fetch → pagesVersion bumps → PNG + PDF.js refetch
      toast("Text added to the document.");
    } finally {
      setEditorBusy(false);
    }
  }

  // --- Edit-text tool: click an existing run → contenteditable overlay → burn server-side ----------
  // A disjoint page-owning mode (peer of redact/texting). Edits are burned server-side (whiteout the
  // original run + restamp the new text), then a full re-fetch — so, like redact/add-text, there is
  // no client-side pending array and no new undo stack.
  function wireEdit() {
    var e = state.editor;
    if (el("ed-edit")) el("ed-edit").onclick = function () {
      e.editing = !e.editing;
      if (e.editing) { e.tool = "select"; e.redact = false; e.texting = false; e.txedit = null; e.txdraft = null; } // one page-owning mode
      e.edSel = null;
      renderEditor();
      if (e.editing) loadEditSpans();          // fetch the editable runs for every page
    };
    if (!e.editing) return;
    wireEditTargets();
  }

  // Fetch backend text runs per page (server-authoritative {x,y,w,h,oy,size,font,color,text}); cache
  // per page so renders don't refetch, then repaint so the hit layer appears.
  async function loadEditSpans() {
    var e = state.editor;
    if (!e || !e.editing) return;
    await Promise.all(e.pages.map(async function (_, pi) {
      if (e.edSpans[pi]) return;               // already cached (incl. an empty page)
      var r = await api("/api/mysign/agreements/" + e.aid + "/spans?page=" + pi);
      if (state.editor !== e) return;          // navigated away mid-fetch
      e.edSpans[pi] = (r.ok && r.data && r.data.spans) ? r.data.spans : []; // cache [] so we stop retrying
    }));
    if (state.editor === e && e.editing) renderEditor();
  }

  // Bind each transparent .sg-ed-hit run to open its in-place editor. When an overlay is already open
  // we don't preventDefault — clicking away lets the contenteditable blur (which commits) first.
  function wireEditTargets() {
    var e = state.editor;
    Array.prototype.forEach.call(document.querySelectorAll(".sg-ed-hit"), function (hit) {
      hit.addEventListener("pointerdown", function (ev) {
        if (e.edSel) return;                   // finish the current edit first (Enter / Esc / click-away)
        ev.preventDefault();
        var k = hit.getAttribute("data-ed").split("_");
        openRunEditor(+k[0], +k[1]);
      });
    });
  }

  // PDF PostScript name → a renderable CSS family (+ weight/style). "times/serif" → serif,
  // "courier/mono/consol" → monospace, else sans-serif; bold from "bold", italic from "italic/oblique".
  // Mirror of server/fontmap.py _family_key/_classify for the 6 metric-compatible clone families,
  // so the on-screen edit overlay renders the SAME face the server will BURN (WYSIWYG). Kept in
  // parity with fontmap._SUBSTITUTE by tests/test_fontmap_preview_parity.py. Any name that maps to
  // a non-metric web/brand face (rare in contracts) falls back to the nearest clone + system stack.
  var SG_FONT_SUB = { arial:"arimo", helvetica:"arimo", helveticaneue:"arimo", arimo:"arimo",
    liberationsans:"arimo", segoeui:"arimo", segoe:"arimo", verdana:"arimo", tahoma:"arimo",
    trebuchet:"arimo", trebuchetms:"arimo", dejavusans:"arimo", franklingothic:"arimo",
    timesnewroman:"tinos", times:"tinos", liberationserif:"tinos", tinos:"tinos",
    couriernew:"cousine", courier:"cousine", consolas:"cousine", monaco:"cousine",
    liberationmono:"cousine", cousine:"cousine", calibri:"carlito", calibrilight:"carlito",
    carlito:"carlito", cambria:"caladea", caladea:"caladea", cambriamath:"caladea",
    georgia:"gelasio", gelasio:"gelasio" };
  var SG_FONT_STACK = { arimo:"'Arimo', Arial, Helvetica, sans-serif",
    tinos:"'Tinos', 'Times New Roman', Times, serif",
    cousine:"'Cousine', 'Courier New', Courier, monospace",
    carlito:"'Carlito', Calibri, Arial, sans-serif",
    caladea:"'Caladea', Cambria, Georgia, serif",
    gelasio:"'Gelasio', Georgia, 'Times New Roman', serif" };
  function pdfFontToCss(name) {
    var raw = name || "";
    var bold = /bold|black|heavy|semibold|demibold/i.test(raw);
    var italic = /italic|oblique/i.test(raw);
    // _norm: strip subset prefix ("ABCDEE+"), drop weight/style words, lowercase, strip non-alnum
    var n = raw.split("+").pop()
      .replace(/(thin|extralight|ultralight|light|regular|normal|medium|semibold|demibold|demi|semibd|bold|black|heavy|italic|oblique|obl|mt|ms|std|pro|psmt)/gi, "")
      .toLowerCase().replace(/[^a-z0-9]/g, "");
    var key = SG_FONT_SUB[n];
    if (!key) {                                   // contains-match (ArialNarrow -> arial)
      for (var k in SG_FONT_SUB) { if (k.length >= 4 && n.indexOf(k) >= 0) { key = SG_FONT_SUB[k]; break; } }
    }
    if (!key) {                                   // classify fallback == fontmap _GENERIC
      if (/times|serif|georgia|roman|garamond|minion|merri|cambria|caladea|gelasio|ptserif|book|antiqua/.test(n)) key = "tinos";
      else if (/courier|mono|consol|cousine|jetbrains|menlo|monaco/.test(n)) key = "cousine";
      else key = "arimo";
    }
    return { family: SG_FONT_STACK[key], bold: bold, italic: italic, clone: key };
  }

  // Sample the painted PDF canvas a hair ABOVE the run for a flat local background color (mask fill).
  // Same-origin (/api/mysign) so getImageData is untainted; white fallback when the canvas is unpainted.
  function sampleBg(pageEl, s) {
    try {
      var cv = pageEl.querySelector(".sg-pdf-canvas");
      if (!cv || !cv.width || !cv.height) return "#ffffff";
      var sx = cv.width, sy = cv.height;
      var px = Math.max(0, Math.min(sx - 1, Math.round(s.x * sx)));
      var py = Math.max(0, Math.min(sy - 1, Math.round((s.y - s.h * 0.4) * sy))); // just above the glyphs
      var d = cv.getContext("2d").getImageData(px, py, 1, 1).data;
      if (d[3] === 0) return "#ffffff";        // transparent → treat as white page
      return "rgb(" + d[0] + "," + d[1] + "," + d[2] + ")";
    } catch (_) { return "#ffffff"; }
  }

  // Build the contenteditable overlay over a run: styled to match (font/size/color), the original
  // glyphs masked by a page-bg patch (preview only — the real burn is server-side on commit).
  function openRunEditor(pi, i) {
    var e = state.editor, s = (e.edSpans[pi] || [])[i];
    if (!s) return;
    var pageEl = document.querySelector('.sg-page[data-page="' + pi + '"]');
    if (!pageEl) return;
    var layer = pageEl.querySelector(".sg-ed-layer");
    if (!layer) return;
    var ph = pageEl.clientHeight, pgPt = e.pages[pi];
    if (!ph || !pgPt || !+pgPt.h) return;                 // page not laid out → avoid NaN size
    var pxSize = s.size / (+pgPt.h) * ph;                 // PDF pt → screen px (same math as txSyncFontSizes)
    var css = pdfFontToCss(s.font);
    var color = /^#[0-9a-f]{3,8}$/i.test(s.color || "") ? s.color : "#111111";

    var mask = document.createElement("div");
    mask.className = "sg-ed-mask";
    mask.style.cssText = "left:" + (s.x * 100) + "%;top:" + (s.y * 100) + "%;width:" +
      ((s.w * 100) + 0.4) + "%;height:" + ((s.h * 100) + 0.4) + "%;background:" + sampleBg(pageEl, s);
    layer.appendChild(mask);

    var ed = document.createElement("div");
    ed.className = "sg-ed-editor";
    ed.setAttribute("contenteditable", "true");
    ed.spellcheck = false;
    if (s.dir === "rtl" || s.dir === "ltr") ed.dir = s.dir;
    ed.textContent = s.text;
    ed.style.cssText =
      "left:" + (s.x * 100) + "%;top:" + (s.y * 100) + "%;min-width:" + (s.w * 100) + "%;" +
      "font-family:" + css.family + ";font-size:" + pxSize + "px;line-height:1;" +
      "font-weight:" + (css.bold ? "700" : "400") + ";font-style:" + (css.italic ? "italic" : "normal") + ";" +
      "color:" + color;
    layer.appendChild(ed);
    e.edSel = { pi: pi, i: i, ed: ed, mask: mask, orig: s.text };

    // Focus + select-all. Native typing and Ctrl-Z work because the document keydown (Pass-5) treats
    // isContentEditable as inField and bails — no app undo/zoom fights the editor.
    ed.focus();
    try {
      var sel = window.getSelection(), rng = document.createRange();
      rng.selectNodeContents(ed); sel.removeAllRanges(); sel.addRange(rng);
    } catch (_) {}

    ed.addEventListener("keydown", function (ev) {
      if (ev.key === "Enter" && !ev.shiftKey) { ev.preventDefault(); ed.blur(); }              // Enter → commit
      else if (ev.key === "Escape") { ev.preventDefault(); ev.stopPropagation(); cancelOpenEdit(); } // Esc → revert
    });
    ed.addEventListener("blur", function () { commitOpenEdit(); });
  }

  function dropOverlay(g) {
    if (!g) return;
    if (g.mask && g.mask.parentNode) g.mask.parentNode.removeChild(g.mask);
    if (g.ed && g.ed.parentNode) g.ed.parentNode.removeChild(g.ed);
  }
  // Esc / leave-mode: drop the overlay + mask without writing (reveals the original glyphs).
  function cancelOpenEdit() {
    var e = state.editor, g = e && e.edSel;
    if (!g) return;
    e.edSel = null;
    dropOverlay(g);
  }
  // Map a body-level error code to a plain toast (NO "edited" badge — the result is native or refused).
  function editErr(code) {
    code = code || "";
    if (code.indexOf("locked") === 0)      return { msg: "This document is already sent and can't be edited.", type: "warning" };
    if (code.indexOf("too_long") === 0)    return { msg: "That replacement is too long to fit — shorten it.", type: "warning" };
    if (code.indexOf("rotated") === 0)     return { msg: "This line is rotated and can't be edited yet.", type: "info" };
    if (code.indexOf("no_run") === 0)      return { msg: "No editable text there.", type: "info" };
    if (code.indexOf("unsupported") === 0) return { msg: "Some characters aren't supported in that font.", type: "warning" };
    if (code.indexOf("empty") === 0)       return { msg: "Text can't be empty — press Esc to cancel instead.", type: "info" };
    return { msg: "Couldn't save the edit.", type: "warning" };
  }
  // Commit on Enter/blur: only when the text actually changed. POST {page,bbox,text} (server
  // re-extracts font/size/color/baseline); on ok re-fetch via openEditor and stay in edit mode.
  async function commitOpenEdit() {
    var e = state.editor, g = e && e.edSel;
    if (!g) return;
    var next = g.ed.textContent.replace(/\r\n|\r/g, "\n");
    if (next === g.orig) { cancelOpenEdit(); return; }   // no change → drop overlay, no write
    var aid = e.aid, pi = g.pi, s = (e.edSpans[pi] || [])[g.i];
    e.edSel = null;                                      // guard against a re-entrant blur commit
    if (!s) { dropOverlay(g); return; }
    setEditorBusy(true);
    try {
      var r = await api("/api/mysign/agreements/" + aid + "/edit-text", {
        method: "POST",
        json: { items: [{ page: pi, bbox: { x: s.x, y: s.y, w: s.w, h: s.h }, text: next }] }
      });
      if (r.status === 401) return renderLanding("login");
      if (!r.ok || !r.data || r.data.ok === false) {
        dropOverlay(g);
        var er = editErr(r.data && r.data.error);
        return toast(er.msg, { type: er.type });
      }
      // Burned server-side → re-fetch rebuilds pages + spans; then re-enter edit mode on the fresh doc.
      await openEditor(aid);
      var ne = state.editor;
      if (ne && ne.aid === aid) { ne.editing = true; ne.edSel = null; ne.edSpans = {}; renderEditor(); loadEditSpans(); }
      toast("Text updated.");
    } finally {
      setEditorBusy(false);
    }
  }

  // --- Prepare-pages panel: wiring + ops ------------------------------------
  function wirePrepare() {
    var e = state.editor;
    Array.prototype.forEach.call(document.querySelectorAll(".sg-pt-rot"), function (b) {
      b.onclick = function () { pageOp("rotate", { page: +b.getAttribute("data-rot"), deg: +b.getAttribute("data-deg") }); };
    });
    Array.prototype.forEach.call(document.querySelectorAll(".sg-pt-del"), function (b) {
      b.onclick = function () {
        var i = +b.getAttribute("data-ptdel");
        if (e.pages.length <= 1) { toast("A document needs at least one page.", { error: true }); return; }
        if (window.confirm("Delete page " + (i + 1) + " and any fields on it?")) pageOp("delete", { page: i });
      };
    });
    var add = el("sg-addpages");
    if (add) add.onchange = function () { var f = this.files && this.files[0]; this.value = ""; uploadPages(f); };
    // drag-reorder: build the new visual order of OLD page indices -> order[new]=old.
    Array.prototype.forEach.call(document.querySelectorAll(".sg-pt"), function (row) {
      row.addEventListener("dragstart", function (ev) {
        ev.dataTransfer.setData("text/plain", "pt:" + row.getAttribute("data-pt"));
        ev.dataTransfer.effectAllowed = "move";
      });
      row.addEventListener("dragover", function (ev) { ev.preventDefault(); row.classList.add("sg-pt-over"); });
      row.addEventListener("dragleave", function () { row.classList.remove("sg-pt-over"); });
      row.addEventListener("drop", function (ev) {
        ev.preventDefault();
        row.classList.remove("sg-pt-over");
        var raw = ev.dataTransfer.getData("text/plain") || "";
        if (raw.indexOf("pt:") !== 0) return; // ignore a stray field-palette drag
        var from = +raw.slice(3), to = +row.getAttribute("data-pt");
        if (isNaN(from) || isNaN(to) || from === to) return;
        var seq = e.pages.map(function (_, i) { return i; });
        seq.splice(from, 1);
        seq.splice(to, 0, from);
        pageOp("reorder", { order: seq });
      });
    });
  }

  // Every page op: flush unsaved field placements to the DB first (so the server
  // remap operates on what the user sees), run the op, then re-fetch the whole
  // editor — openEditor rebuilds pages/items from the remapped DB rows and resets
  // pagesVersion to the new doc_hash, busting the changed thumbnails + canvas.
  async function pageOp(op, body) {
    var e = state.editor;
    if (e.sending) return;
    setEditorBusy(true);
    try {
      if (hasNamedSigner() && e.items.length) {
        try { await persist(); }
        catch (err) { if (err.message === "auth") return renderLanding("login"); }
      }
      var r = await api("/api/mysign/agreements/" + e.aid + "/pages/" + op, { method: "POST", json: body });
      if (r.status === 401) return renderLanding("login");
      if (!r.ok || !r.data || r.data.ok === false) {
        var msg = (r.data && r.data.error) || "";
        return toast(msg.indexOf("locked") === 0 ? "This document was already sent." : "Couldn't update pages.", { error: true });
      }
      await openEditor(e.aid);
    } finally {
      setEditorBusy(false);
    }
  }

  async function uploadPages(f) {
    var e = state.editor;
    if (!f || e.sending) return;
    setEditorBusy(true);
    try {
      if (hasNamedSigner() && e.items.length) {
        try { await persist(); }
        catch (err) { if (err.message === "auth") return renderLanding("login"); }
      }
      var fd = new FormData();
      fd.append("file", f);
      var r = await fetch("/api/mysign/agreements/" + e.aid + "/pages/add", { method: "POST", body: fd, credentials: "same-origin" });
      if (r.status === 401) return renderLanding("login");
      var d = null; try { d = await r.json(); } catch (_) {}
      if (r.ok && d && d.ok) return openEditor(e.aid);
      toast(d && d.error === "not a PDF" ? "That file isn't a PDF." : "Couldn't add pages.", { error: true });
    } finally {
      setEditorBusy(false);
    }
  }

  function placeField(pageIdx, clientX, clientY, type) {
    var e = state.editor;
    var d = SG_FIELDS.find(function (f) { return f.type === type; });
    if (!d) return;
    if (!hasNamedSigner()) { toast("Add a signer first.", { error: true }); return; }
    var pageEl = document.querySelector('.sg-page[data-page="' + pageIdx + '"]');
    if (!pageEl) return;
    var r = pageEl.getBoundingClientRect();
    if (!r.width || !r.height) { toast("Page still loading — try again in a moment.", { error: true }); return; }
    var cx = (clientX - r.left) / r.width, cy = (clientY - r.top) / r.height;
    e.items.push({
      type: d.type, page: pageIdx,
      x: Math.max(0, Math.min(1 - d.w, cx - d.w / 2)),
      y: Math.max(0, Math.min(1 - d.h, cy - d.h / 2)),
      w: d.w, h: d.h, signer: e.activeSigner, required: true, value: "", placeholder: "",
      prefill: false, prompt: "", field_key: ""
    });
    e.sel = e.items.length - 1;
    e.dirty = true;
    pushHistory();
    renderEditor();
  }

  function deleteField(i) {
    var e = state.editor;
    e.items.splice(i, 1);
    e.sel = null;
    e.dirty = true;
    pushHistory();
    renderEditor();
  }

  function removeSigner(r) {
    var e = state.editor;
    if (e.signers.length <= 1) return;
    var owned = e.items.filter(function (it) { return it.signer === r; }).length;
    if (owned && !window.confirm("This also removes " + owned + " field" + (owned === 1 ? "" : "s") + " assigned to them. Continue?")) return;
    e.signers.splice(r, 1);
    // Fields owned by the removed signer are dropped; higher indices shift down.
    e.items = e.items.filter(function (it) { return it.signer !== r; });
    e.items.forEach(function (it) { if (it.signer > r) it.signer -= 1; });
    if (e.activeSigner >= e.signers.length) e.activeSigner = e.signers.length - 1;
    else if (e.activeSigner > r) e.activeSigner -= 1;
    e.sel = null;
    e.dirty = true;
    pushHistory();               // snapshot signers+items together so this is undoable/consistent
    renderEditor();
  }

  function positionBox(i) {
    var box = document.querySelector('.sg-field[data-fi="' + i + '"]');
    if (!box) return;
    var it = state.editor.items[i];
    box.style.left = (it.x * 100) + "%";
    box.style.top = (it.y * 100) + "%";
    box.style.width = (it.w * 100) + "%";
    box.style.height = (it.h * 100) + "%";
  }

  function dragStart(ev, i, mode) {
    var e = state.editor;
    var pageEl = ev.target.closest(".sg-page");
    if (!pageEl) return;
    var r = pageEl.getBoundingClientRect();
    if (!r.width || !r.height) return; // page not laid out yet — avoid NaN move/resize deltas
    var it = e.items[i];
    e.sel = i;
    e.drag = {
      i: i, mode: mode, sx: ev.clientX, sy: ev.clientY, pw: r.width, ph: r.height,
      ox: it.x, oy: it.y, ow: it.w, oh: it.h
    };
    ev.preventDefault();
    document.addEventListener("pointermove", dragMove);
    document.addEventListener("pointerup", dragEnd, { once: true });
  }
  function dragMove(ev) {
    var g = state.editor.drag;
    if (!g) return;
    var dx = (ev.clientX - g.sx) / g.pw, dy = (ev.clientY - g.sy) / g.ph;
    var it = state.editor.items[g.i];
    if (g.mode === "move") {
      it.x = Math.max(0, Math.min(1 - it.w, g.ox + dx));
      it.y = Math.max(0, Math.min(1 - it.h, g.oy + dy));
    } else {
      it.w = Math.max(0.03, Math.min(1 - it.x, g.ow + dx));
      it.h = Math.max(0.02, Math.min(1 - it.y, g.oh + dy));
    }
    positionBox(g.i);
  }
  function dragEnd() {
    var g = state.editor.drag;
    state.editor.drag = null;
    document.removeEventListener("pointermove", dragMove);
    if (g) { state.editor.dirty = true; pushHistory(); }  // a field was moved/resized
    renderEditor();
  }

  // EXACT persist sequence: POST /signers -> map returned ids -> POST /fields.
  async function persist() {
    var e = state.editor, aid = e.aid;
    var sent = e.signers.map(function (s, i) { return { s: s, i: i }; })
      .filter(function (o) { return (o.s.email || "").trim() || (o.s.name || "").trim(); });
    if (!sent.length) throw new Error("no-signers");
    var body = {
      signers: sent.map(function (o, k) {
        return {
          name: o.s.name || "", email: (o.s.email || "").trim(),
          role: "signer", order: k + 1, is_consumer: false, auth: "email"
        };
      })
    };
    var sr = await api("/api/mysign/agreements/" + aid + "/signers", { method: "POST", json: body });
    if (sr.status === 401) throw new Error("auth");
    if (!sr.ok || !sr.data || sr.data.ok === false) throw new Error("signers");
    var rows = sr.data.signers || []; // ORDER BY sign_order
    // Map each editor signer index -> new DB id. Match by lowercased email; fall back to position.
    var idxToId = {};
    sent.forEach(function (o, k) {
      var em = (o.s.email || "").trim().toLowerCase();
      var row = em ? rows.find(function (rr) { return (rr.email || "").toLowerCase() === em; }) : rows[k];
      if (row) { idxToId[o.i] = row.id; e.signers[o.i].id = row.id; }
    });
    var firstId = rows[0] && rows[0].id;
    var fields = e.items.map(function (it) {
      return {
        signer_id: idxToId[it.signer] != null ? idxToId[it.signer] : firstId,
        type: it.type, page: it.page, x: it.x, y: it.y, w: it.w, h: it.h,
        required: it.required !== false, value: it.value || "", placeholder: it.placeholder || "",
        prefill: it.prefill ? 1 : 0, prompt: it.prompt || "", field_key: it.field_key || ""
      };
    });
    var fr = await api("/api/mysign/agreements/" + aid + "/fields", { method: "POST", json: { fields: fields } });
    if (!fr.ok || !fr.data || fr.data.ok === false) throw new Error("fields");
    e.dirty = false;  // saved — no unsaved work to warn about
    return { idxToId: idxToId };
  }

  // Guard against double-save / double-send: disable the bar buttons while a request is in flight.
  function setEditorBusy(busy) {
    if (state.editor) state.editor.sending = busy;
    ["ed-save", "ed-review", "sg-rd-apply"].forEach(function (id) { var b = el(id); if (b) b.disabled = busy; });
  }

  async function saveDraft() {
    var e = state.editor;
    if (e.sending) return;
    setEditorBusy(true);
    try {
      await persist();
      toast("Draft saved.");
    } catch (err) {
      if (err.message === "auth") return renderLanding("login");
      toast(err.message === "no-signers" ? "Add a signer with a name or email first." : "Couldn't save the document.", { error: true });
    } finally {
      setEditorBusy(false);
    }
  }

  var modalKeyHandler = null;
  var modalOpener = null;
  function closeModal() {
    if (modalKeyHandler) { document.removeEventListener("keydown", modalKeyHandler); modalKeyHandler = null; }
    var m = document.getElementById("sg-scrim");
    if (m && m.parentNode) m.parentNode.removeChild(m);
    // Return focus to the control that opened the dialog (WCAG 2.4.3 Focus Order).
    if (modalOpener && modalOpener.focus) { modalOpener.focus(); }
    modalOpener = null;
  }

  function openReviewModal() {
    var e = state.editor;
    var recips = e.signers.filter(function (s) { return (s.email || "").trim() || (s.name || "").trim(); });
    var missing = recips.filter(function (s) { return !(s.email || "").trim(); });
    var checklist = [];
    if (!recips.length) checklist.push("Add at least one signer");
    if (missing.length) checklist.push("Every signer needs an email address");
    if (!e.items.length) checklist.push("Place at least one field (e.g. a signature)");
    var body;
    if (checklist.length) {
      body = '<p class="muted" style="margin:0 0 10px">Finish these before sending:</p><ul style="margin:0 0 8px;padding-left:18px">' +
        checklist.map(function (c) { return "<li>" + esc(c) + "</li>"; }).join("") + "</ul>";
    } else {
      body = '<p class="muted" style="margin:0 0 10px">Sending to:</p>' +
        recips.map(function (s, i) {
          return '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">' +
            '<span class="sg-swatch" style="background:' + signerColor(i) + '"></span>' +
            "<span>" + esc(s.name || "(no name)") + " &lt;" + esc(s.email) + "&gt;</span></div>";
        }).join("") +
        '<label class="sg-plabel" style="margin-top:14px">Message to signers (optional)' +
          '<textarea class="ap-input" id="sg-msg" rows="3" style="resize:vertical">' + esc(e.msg || "") + "</textarea></label>" +
        '<p class="muted" style="font-size:12.5px;margin:12px 0 0">Once sent, the document and its fields are locked and cannot be edited.</p>';
    }
    var scrim = document.createElement("div");
    scrim.className = "sg-scrim";
    scrim.id = "sg-scrim";
    scrim.innerHTML =
      '<div class="sg-modal" role="dialog" aria-modal="true" aria-label="Review and send" tabindex="-1">' +
        "<h2>Review &amp; send</h2>" + body +
        '<div class="row" style="justify-content:flex-end;margin-top:18px">' +
          '<button class="ap-btn ap-btn--ghost" id="sg-cancel">Cancel</button>' +
          (checklist.length ? "" : '<button class="ap-btn ap-btn--primary" id="sg-confirm">Send for signature</button>') +
        "</div>" +
      "</div>";
    modalOpener = document.activeElement;   // remember trigger so focus returns on close
    document.body.appendChild(scrim);
    scrim.addEventListener("click", function (ev) { if (ev.target === scrim) closeModal(); });
    // Escape closes; Tab/Shift+Tab are trapped inside the dialog (aria-modal alone does not stop Tab
    // and the background is not inert), cycling between the first and last focusable controls.
    modalKeyHandler = function (ev) {
      if (ev.key === "Escape") { closeModal(); return; }
      if (ev.key === "Tab") {
        var f = scrim.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
        f = Array.prototype.filter.call(f, function (n) { return !n.disabled && n.offsetParent !== null; });
        if (!f.length) return;
        var first = f[0], last = f[f.length - 1];
        if (ev.shiftKey && document.activeElement === first) { ev.preventDefault(); last.focus(); }
        else if (!ev.shiftKey && document.activeElement === last) { ev.preventDefault(); first.focus(); }
      }
    };
    document.addEventListener("keydown", modalKeyHandler);
    // Move focus into the dialog so keyboard users land inside it (and Escape works immediately).
    (el("sg-confirm") || el("sg-cancel") || scrim.querySelector(".sg-modal")).focus();
    el("sg-cancel").onclick = closeModal;
    if (el("sg-confirm")) el("sg-confirm").onclick = function () {
      if (el("sg-msg")) e.msg = el("sg-msg").value;
      closeModal();
      doSend();
    };
  }

  async function doSend() {
    var e = state.editor;
    if (e.sending) return;
    // Duplicate emails collapse both signers' field assignments onto the first row (persist maps
    // fields by email) — reject before sending so a signer never gets another's fields.
    var emails = e.signers.map(function (s) { return (s.email || "").trim().toLowerCase(); }).filter(Boolean);
    if (emails.some(function (em, i) { return emails.indexOf(em) !== i; })) {
      return toast("Two signers share the same email — give each signer a unique email.", { error: true });
    }
    setEditorBusy(true);
    try {
      try {
        await persist();
      } catch (err) {
        if (err.message === "auth") return renderLanding("login");
        return toast(err.message === "no-signers" ? "Add a signer with an email first." : "Couldn't save the document.", { error: true });
      }
      if (!e.signers.some(function (s) { return (s.email || "").trim(); })) return toast("Every signer needs an email.", { error: true });
      var r = await api("/api/mysign/agreements/" + e.aid + "/send", { method: "POST", json: { message: e.msg } });
      if (r.netError) return toast("You appear to be offline — check your connection and try again.", { error: true });
      if (r.status === 403 && r.data && r.data.error === "subscription_inactive") {
        return renderAccount("Your subscription is inactive — reactivate to send.");
      }
      if (r.status === 403 && r.data && r.data.error === "email_unverified") {
        return toast("Confirm your email first — check your inbox for the verification link.");
      }
      if (r.ok && r.data && r.data.ok) {
        var note = "Sent to " + (r.data.emailed || 0) + " signer(s).";
        return playSendCeremony(function () { openTrack(e.aid, note, "success"); });
      }
      // /send returns human-readable, sometimes-actionable messages (e.g. "already sent — use
      // Remind", "re-open the editor and re-save before sending") — surface them, don't mask them.
      toast((r.data && r.data.error) || "Couldn't send the document — please try again.", { error: true });
    } finally {
      setEditorBusy(false);
    }
  }

  // Send ceremony — plays ONLY on a confirmed send success (doSend's r.ok branch). Purely visual:
  // the network result is already known, so this delays the VIEW swap by ~1s, never the send and
  // never an error path. Reduced-motion skips straight through; a timeout ceiling can't strand the user.
  function playSendCeremony(done) {
    var reduce = false;
    try { reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion:reduce)").matches; } catch (_) {}
    if (reduce) return done();
    var ov = document.createElement("div");
    ov.className = "sg-cer";
    ov.setAttribute("aria-hidden", "true");   // the track view's toast carries the announcement
    ov.innerHTML =
      '<div class="sg-cer__card">' +
        '<div class="sg-cer__lines"><i></i><i></i><i></i><i></i></div>' +
        '<div class="sg-cer__ring"></div>' +
        '<div class="sg-cer__seal">' + svg('<circle cx="12" cy="12" r="9"/><path d="M8 12.4l2.6 2.6L16 9"/>') + "</div>" +
      "</div>";
    document.body.appendChild(ov);
    var settled = false;
    var finish = function () {
      if (settled) return; settled = true;
      ov.classList.add("sg-cer--out");
      setTimeout(function () { if (ov.parentNode) ov.parentNode.removeChild(ov); done(); }, 300);
    };
    var seal = ov.querySelector(".sg-cer__seal");
    if (seal) seal.addEventListener("animationend", function () { setTimeout(finish, 260); });
    setTimeout(finish, 1400);   // hard ceiling — a dropped animationend can never trap the user
  }

  // --- track / document detail ---------------------------------------------
  var EVENT_LABELS = {
    created: "Created", edited: "Edited", sent: "Sent for signature", emailed: "Email delivered",
    DOC_FROZEN: "Document frozen", SIGNER_AUTHENTICATED: "Signer verified", viewed: "Viewed",
    signed: "Signed", completed: "Completed", voided: "Voided", declined: "Declined"
  };
  function eventLabel(t) {
    return EVENT_LABELS[t] || String(t || "").replace(/_/g, " ").toLowerCase().replace(/^./, function (c) { return c.toUpperCase(); });
  }
  // Event type -> severity color (shared --sev-* palette, echoing the ok/info/warn/err badge map)
  // + icon key. Kept beside EVENT_LABELS so the two stay in sync. Unmapped types fall back to info.
  var EVENT_STYLE = {
    created:              { sev: "muted",   icon: "doc" },
    edited:               { sev: "muted",   icon: "pen" },
    sent:                 { sev: "info",    icon: "send" },
    emailed:              { sev: "info",    icon: "mail" },
    reminder:             { sev: "warning", icon: "bell" },
    viewed:               { sev: "warning", icon: "eye" },
    SIGNER_AUTHENTICATED: { sev: "info",    icon: "shield" },
    DOC_FROZEN:           { sev: "info",    icon: "lock" },
    signed:               { sev: "success", icon: "pen" },
    completed:            { sev: "success", icon: "check" },
    declined:             { sev: "error",   icon: "x" },
    voided:               { sev: "error",   icon: "ban" },
    cancelled:            { sev: "error",   icon: "ban" }
  };
  // Timeline glyphs — routed through svg() (24-grid, weight 2, round) for one stroke idiom.
  var EVT_ICON = {
    doc:    svg('<path d="M14 3H7a1 1 0 0 0-1 1v16a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V7z"/><path d="M14 3v4h4"/>'),
    pen:    svg('<path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/>'),
    send:   svg('<path d="M21 3 10 14"/><path d="M21 3l-7 18-4-8-8-4z"/>'),
    mail:   svg('<rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3.5 7 8.5 6 8.5-6"/>'),
    bell:   svg('<path d="M7 9a5 5 0 0 1 10 0c0 5 2 6 2 6H5s2-1 2-6z"/><path d="M10.5 20a1.5 1.5 0 0 0 3 0"/>'),
    eye:    svg('<path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/>'),
    shield: svg('<path d="M12 3l7 4v5c0 4-3 7-7 9-4-2-7-5-7-9V7l7-4z"/><path d="M9 12l2 2 4-4"/>'),
    lock:   svg('<rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V8a5 5 0 0 1 10 0v3"/>'),
    check:  svg('<path d="M9 12l2 2 4-4"/><circle cx="12" cy="12" r="9"/>'),
    x:      svg('<path d="M7 7l10 10M17 7L7 17"/>'),
    ban:    svg('<circle cx="12" cy="12" r="9"/><path d="M6 6l12 12"/>'),
    dot:    svg('<circle cx="12" cy="12" r="3.5" fill="currentColor" stroke="none"/>')
  };

  async function openTrack(aid, note, noteType) {
    clearTrackPoll();
    h(topbar(true) + '<div class="wrap"><div class="center"><div class="spin"></div></div></div>');
    wireTopbar();
    var r = await api("/api/mysign/agreements/" + aid);
    if (r.status === 401) return renderLanding("login");
    var a = r.data;
    if (!a || a.error || !a.id) return renderDashboard();
    renderTrack(a, note);
    if (note) toast(note, noteType ? { type: noteType } : undefined);
    // Poll while the document is still in flight.
    if (!TERMINAL[a.status]) {
      state.trackTimer = setInterval(function () {
        api("/api/mysign/agreements/" + aid).then(function (rr) {
          if (rr.status === 401) { clearTrackPoll(); return renderLanding("login"); }
          if (rr.data && rr.data.id) {
            renderTrack(rr.data);
            if (TERMINAL[rr.data.status]) clearTrackPoll();
          }
        });
      }, 20000);
    }
  }

  function renderTrack(a, note) {
    var signers = a.signers || [];
    var total = signers.length;
    var signed = signers.filter(function (s) { return s.status === "signed"; }).length;
    var events = a.events || [];
    var idName = {};
    signers.forEach(function (s) { idName[s.id] = s.name || s.email || "Signer"; });

    var rollup = signers.map(function (s, i) {
      var st = SIGNER_STATUS[s.status] || { label: s.status || "—", cls: "ap-badge--plain" };
      return "<tr>" +
        '<td><span class="trk-dot" aria-hidden="true" style="background:' + (s.color || signerColor(i)) + '"></span></td>' +
        "<td>" + esc(s.name || "(no name)") + '<div class="muted" style="font-size:12.5px">' + esc(s.email || "") + "</div></td>" +
        '<td><span class="ap-badge ' + st.cls + '">' + esc(st.label) + "</span></td>" +
        '<td class="muted" style="font-size:12.5px">' +
          (s.signed_at ? "Signed " + fmtDateTime(s.signed_at) : s.viewed_at ? "Viewed " + fmtDateTime(s.viewed_at) : "—") +
        "</td></tr>";
    }).join("");

    var timeline = events.length
      ? events.map(function (ev) {
          var who = ev.signer_id && idName[ev.signer_id] ? " — " + esc(idName[ev.signer_id]) : "";
          var sty = EVENT_STYLE[ev.type] || { sev: "info", icon: "dot" };
          return '<li class="trk-ev trk-ev--' + sty.sev + '">' +
            '<span class="trk-ev__mark" aria-hidden="true">' + (EVT_ICON[sty.icon] || EVT_ICON.dot) + "</span>" +
            '<span class="trk-ev__body"><strong>' + esc(eventLabel(ev.type)) + "</strong>" + who +
            (ev.detail ? ' <span class="muted">' + esc(ev.detail) + "</span>" : "") +
            '<div class="muted" style="font-size:12px">' + esc(fmtDateTime(ev.at)) + "</div></span></li>";
        }).join("")
      : '<li class="muted">No activity yet.</li>';

    var st = a.status;
    var acts = [];
    if (st === "draft") {
      // Sending happens only through the editor's Review & send modal (validated). Drafts route
      // to the editor for one validated send path — no bypass button here.
      acts.push('<button class="ap-btn ap-btn--primary" data-tk="edit">Continue editing</button>');
    } else if (st === "out_for_signature" || st === "sent" || st === "viewed") {
      acts.push('<button class="ap-btn ap-btn--ghost" data-tk="remind">Remind signers</button>');
      acts.push('<button class="ap-btn ap-btn--danger" data-tk="void">Void</button>');
    } else if (st === "completed") {
      acts.push('<button class="ap-btn ap-btn--primary" data-tk="download">Download signed PDF</button>');
      acts.push('<button class="ap-btn ap-btn--ghost" data-tk="cert">Download certificate</button>');
    }

    h(
      topbar(true) +
      '<div class="wrap">' +
        '<div class="trk-head">' +
          '<button class="ap-btn ap-btn--ghost ap-btn--sm" data-tk="back">&larr; Documents</button>' +
          "<h1>" + esc(a.name || "Document") + "</h1>" +
          statusBadge(a.status) +
          '<span class="trk-prog">' + signed + " / " + total + " signed</span>" +
        "</div>" +
        (note ? '<p class="ok" style="margin:0 0 12px">' + esc(note) + "</p>" : "") +
        (acts.length ? '<div class="row" style="margin-bottom:16px">' + acts.join("") + "</div>" : "") +
        '<div class="trk-grid">' +
          '<div class="ap-card"><h3 style="font-family:Sora,sans-serif;font-size:14px;margin:0 0 10px">Recipients</h3>' +
            (total
              ? '<div class="tbl-wrap" style="border:0"><table class="doc-table"><thead><tr><th scope="col"><span class="sr-only">Signer color</span></th><th scope="col">Signer</th><th scope="col">Status</th><th scope="col">Activity</th></tr></thead><tbody>' + rollup + "</tbody></table></div>"
              : '<p class="muted">No signers.</p>') +
          "</div>" +
          '<div class="ap-card"><h3 style="font-family:Sora,sans-serif;font-size:14px;margin:0 0 10px">Activity</h3>' +
            '<ul class="trk-timeline">' + timeline + "</ul>" +
          "</div>" +
        "</div>" +
      "</div>"
    );
    wireTopbar();
    Array.prototype.forEach.call(document.querySelectorAll("[data-tk]"), function (b) {
      b.onclick = function () { trackAction(b.getAttribute("data-tk"), a); };
    });
  }

  async function trackAction(act, a) {
    var aid = a.id;
    if (act === "back") return renderDashboard();
    if (act === "edit") return openEditor(aid);
    if (act === "download") { window.open("/api/mysign/agreements/" + aid + "/download", "_blank"); return; }
    if (act === "cert") { window.open("/api/mysign/agreements/" + aid + "/certificate", "_blank"); return; }
    if (act === "remind") return remindDoc(aid, function () { openTrack(aid); });
    if (act === "void") {
      if (!window.confirm("Void this document? Signers can no longer sign it.")) return;
      var vr = await api("/api/mysign/agreements/" + aid + "/void", { method: "POST", json: {} });
      if (vr.ok && vr.data && vr.data.ok) return openTrack(aid, "Document voided.");
      return toast("Couldn't void.", { error: true });
    }
  }

  // Surface a sign-in error hint carried back on the URL (Google callback, closed signups,
  // an expired magic link, …), then clean it off the address bar.
  var qs = new URLSearchParams(window.location.search);
  var signErr = qs.get("sign_error");
  if (signErr) {
    history.replaceState({}, "", "/app");
    var SIGN_ERR = {
      closed: "This install isn't accepting new sign-ups right now — ask the operator for access.",
      google_unconfigured: "Google sign-in isn't set up here — use an email sign-in link instead.",
      google: "Google sign-in didn't complete — try again, or use an email link.",
      state: "That sign-in attempt expired — please start again.",
      create: "We couldn't create your account — please try again.",
      magic: "That sign-in link is invalid or expired — request a fresh one."
    };
    setTimeout(function () { toast(SIGN_ERR[signErr] || "Sign-in failed — please try again.", { error: true }); }, 500);
  }

  boot();
})();
</script>
</body>
</html>
