<!doctype html>
<html lang="en" data-brand="sign" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Lifted Sign — Send documents for signature</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40' fill='none' stroke='%232E6BFF' stroke-width='2.4' stroke-linecap='round'><circle cx='20' cy='20' r='16.5'/><line x1='3.5' y1='20' x2='36.5' y2='20'/><ellipse cx='20' cy='20' rx='16.5' ry='7.4'/><ellipse cx='20' cy='20' rx='8' ry='16.5'/></svg>">
<!-- Lifted Design System foundation (vendored): tokens + app kit. data-brand="sign" (blue)
     retints --brand; every page rule below builds ON these tokens (no parallel palette). -->
<link rel="stylesheet" href="/static/ds/styles.css">
<link rel="stylesheet" href="/static/ds/appkit/_appkit.css">
<script src="/static/ds/assets/lds-globe.js" defer></script>
<style>
  /* Edit-text WYSIWYG: the edit/add-text overlay renders the SAME metric-compatible clones
     the server BURNS (fontmap.py), so the on-screen preview matches the committed result.
     Lazy-loaded per glyph from /static/ds/ (CSP font-src 'self' + sign-host allowlisted);
     system fallbacks keep a font-404 no worse than today's render. */
  @font-face{font-family:'Arimo';font-weight:400;font-style:normal;src:url('/static/ds/fonts/Arimo-400.ttf');font-display:swap}
  @font-face{font-family:'Arimo';font-weight:700;font-style:normal;src:url('/static/ds/fonts/Arimo-700.ttf');font-display:swap}
  @font-face{font-family:'Arimo';font-weight:400;font-style:italic;src:url('/static/ds/fonts/Arimo-400i.ttf');font-display:swap}
  @font-face{font-family:'Arimo';font-weight:700;font-style:italic;src:url('/static/ds/fonts/Arimo-700i.ttf');font-display:swap}
  @font-face{font-family:'Tinos';font-weight:400;font-style:normal;src:url('/static/ds/fonts/Tinos-400.ttf');font-display:swap}
  @font-face{font-family:'Tinos';font-weight:700;font-style:normal;src:url('/static/ds/fonts/Tinos-700.ttf');font-display:swap}
  @font-face{font-family:'Tinos';font-weight:400;font-style:italic;src:url('/static/ds/fonts/Tinos-400i.ttf');font-display:swap}
  @font-face{font-family:'Tinos';font-weight:700;font-style:italic;src:url('/static/ds/fonts/Tinos-700i.ttf');font-display:swap}
  @font-face{font-family:'Cousine';font-weight:400;font-style:normal;src:url('/static/ds/fonts/Cousine-400.ttf');font-display:swap}
  @font-face{font-family:'Cousine';font-weight:700;font-style:normal;src:url('/static/ds/fonts/Cousine-700.ttf');font-display:swap}
  @font-face{font-family:'Cousine';font-weight:400;font-style:italic;src:url('/static/ds/fonts/Cousine-400i.ttf');font-display:swap}
  @font-face{font-family:'Cousine';font-weight:700;font-style:italic;src:url('/static/ds/fonts/Cousine-700i.ttf');font-display:swap}
  @font-face{font-family:'Carlito';font-weight:400;font-style:normal;src:url('/static/ds/fonts/Carlito-400.ttf');font-display:swap}
  @font-face{font-family:'Carlito';font-weight:700;font-style:normal;src:url('/static/ds/fonts/Carlito-700.ttf');font-display:swap}
  @font-face{font-family:'Carlito';font-weight:400;font-style:italic;src:url('/static/ds/fonts/Carlito-400i.ttf');font-display:swap}
  @font-face{font-family:'Carlito';font-weight:700;font-style:italic;src:url('/static/ds/fonts/Carlito-700i.ttf');font-display:swap}
  @font-face{font-family:'Caladea';font-weight:400;font-style:normal;src:url('/static/ds/fonts/Caladea-400.ttf');font-display:swap}
  @font-face{font-family:'Caladea';font-weight:700;font-style:normal;src:url('/static/ds/fonts/Caladea-700.ttf');font-display:swap}
  @font-face{font-family:'Caladea';font-weight:400;font-style:italic;src:url('/static/ds/fonts/Caladea-400i.ttf');font-display:swap}
  @font-face{font-family:'Caladea';font-weight:700;font-style:italic;src:url('/static/ds/fonts/Caladea-700i.ttf');font-display:swap}
  @font-face{font-family:'Gelasio';font-weight:400;font-style:normal;src:url('/static/ds/fonts/Gelasio-400.ttf');font-display:swap}
  @font-face{font-family:'Gelasio';font-weight:700;font-style:normal;src:url('/static/ds/fonts/Gelasio-700.ttf');font-display:swap}
  @font-face{font-family:'Gelasio';font-weight:400;font-style:italic;src:url('/static/ds/fonts/Gelasio-400i.ttf');font-display:swap}
  @font-face{font-family:'Gelasio';font-weight:700;font-style:italic;src:url('/static/ds/fonts/Gelasio-700i.ttf');font-display:swap}
  /* ============================================================
     LIFTED SIGN — SENDER SPA
     Built ON the DS: tokens (styles.css) + app kit (_appkit.css).
     data-brand="sign" => --brand blue; data-theme pinned dark.
     Premium composition layer — glass, HUD, blue→cyan gradients,
     and the signing-document motif — matched to the marketing
     landing (signland.html). Editor .sg-* geometry is preserved
     verbatim; ported instrument classes are au- prefixed so they
     never collide with the JS-referenced editor selectors.
     ============================================================ */
  /* WCAG 1.4.3 contrast fix scoped to Sign (page is pinned data-theme="dark").
     Overrides ONLY the local --text-faint token so every faint-text consumer at
     once — the floating label, doc-table th, .kv key labels, .sg-rail/.sg-props
     headings — clears the 4.5:1 AA minimum: 6.48:1 on #0B1020, 5.76:1 on card
     #141D31. NOT the shared DS token (colors.css), which is application-wide. Placed
     after the DS stylesheet <link>s so it wins the cascade. */
  :root{--text-faint:#8B97B5}
  /* ONE severity palette — aliases existing DS tokens (never new hexes) so the toast system,
     the track timeline, and the status badges (ok/info/warn/err) can never drift apart.
     --sev-warning MUST be the DS amber (--warning #FFB920) the "Viewed" badge already uses. */
  :root{
    --sev-success:var(--success);
    --sev-info:var(--brand);
    --sev-warning:var(--warning);
    --sev-error:var(--error);
    --sev-muted:var(--text-muted);
  }
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;color:var(--text-body,#e8eef6);
    font-family:var(--font-sans,Inter,system-ui,sans-serif);-webkit-font-smoothing:antialiased;
    background:
      radial-gradient(900px 520px at 88% -12%, color-mix(in srgb,var(--brand) 10%,transparent), transparent 60%),
      radial-gradient(760px 560px at 2% 110%, color-mix(in srgb,var(--brand-grad-to) 6%,transparent), transparent 58%),
      var(--bg-page,#0b1017);
    background-attachment:fixed}
  a{color:inherit;text-decoration:none}
  ::selection{background:var(--brand-tint-strong);color:var(--text-strong)}
  .wrap{max-width:1120px;margin:0 auto;padding:26px 22px 76px}
  .muted{color:var(--text-muted,#93a4bb)}
  .hidden{display:none!important}
  .row{display:flex;gap:10px;flex-wrap:wrap}
  .grow{flex:1;min-width:0}
  .stack{display:flex;flex-direction:column;gap:14px}
  .err{color:var(--error,#ff6b6b);font-size:13px;min-height:18px}
  .ok{color:var(--success,#2ee6a0);font-size:13.5px}
  .grad{background:var(--grad-word);-webkit-background-clip:text;background-clip:text;color:transparent}
  .gradem{background:var(--grad-brand);-webkit-background-clip:text;background-clip:text;color:transparent}
  .center{display:flex;align-items:center;justify-content:center;min-height:60vh}
  .spin{width:34px;height:34px;border:2.5px solid var(--border-default,#20304a);border-top-color:var(--brand);border-radius:50%;animation:sp .8s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}

  /* ---- premium sticky top bar ---- */
  .topbar{position:sticky;top:0;z-index:40;
    background:color-mix(in srgb,var(--bg-page) 72%,transparent);
    -webkit-backdrop-filter:blur(16px) saturate(1.4);backdrop-filter:blur(16px) saturate(1.4);
    border-bottom:1px solid var(--border-subtle)}
  .topbar__in{max-width:1120px;margin:0 auto;height:64px;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:0 22px}
  .brand{display:flex;align-items:center;gap:11px;font-family:var(--font-display,Sora,sans-serif);font-weight:800;font-size:18px;letter-spacing:-.02em;color:var(--text-strong)}
  .brand b{color:var(--brand);font-weight:800}
  .brand .lds-globe{color:var(--brand)}
  .topnav{display:flex;align-items:center;gap:4px}
  .topnav__email{font-family:var(--font-mono);font-size:11.5px;color:var(--text-body);padding:5px 11px;border:1px solid var(--border-default);border-radius:999px;background:var(--ink-800);white-space:nowrap;max-width:34vw;overflow:hidden;text-overflow:ellipsis}
  .topnav__link{font-size:13px;font-weight:600;color:var(--text-muted);background:transparent;border:0;padding:7px 12px;border-radius:9px;cursor:pointer;transition:color .15s,background .15s;font-family:inherit}
  .topnav__link:hover{color:var(--text-strong);background:var(--ink-800)}
  .topnav__link.is-active{color:var(--brand);background:var(--brand-tint)}
  .topnav__sep{width:1px;height:20px;background:var(--border-default);margin:0 4px}
  @media (max-width:640px){.topnav__link{padding:7px 8px;font-size:12px} .topnav__sep{display:none}}
  /* ---- clean account / settings surface ---- */
  .acct-wrap{max-width:640px}
  .acct-hero{display:flex;align-items:center;gap:16px;padding:22px 22px}
  .acct-hero__avatar{width:56px;height:56px;flex:none;border-radius:50%;display:grid;place-items:center;font-family:var(--font-display,Sora,sans-serif);font-weight:800;font-size:22px;color:var(--brand-contrast,#fff);background:var(--grad-brand,linear-gradient(135deg,#2E6BFF,#1B4CD6))}
  .acct-hero__email{font-weight:700;font-size:17px;color:var(--text-strong);letter-spacing:-.01em;word-break:break-all}
  .acct-hero__plan{margin-top:4px;font-size:13px;color:var(--text-muted)}
  .setrow{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:15px 22px;border-top:1px solid var(--border-subtle,rgba(255,255,255,.06))}
  .setrow__k{font-size:14px;color:var(--text-muted);font-weight:500}
  .setrow__v{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--text-strong);text-align:right;flex-wrap:wrap;justify-content:flex-end}
  .navcard-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:16px}
  @media (max-width:520px){.navcard-grid{grid-template-columns:1fr}}
  .navcard{display:block;text-align:left;padding:18px;border:1px solid var(--border-default);border-radius:var(--radius,14px);background:var(--surface-card,var(--ink-800));cursor:pointer;transition:border-color .15s,transform .15s,background .15s;font-family:inherit;text-decoration:none;color:inherit}
  .navcard:hover{text-decoration:none}
  .navcard:hover{border-color:var(--brand);transform:translateY(-2px)}
  .navcard__ic{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;background:var(--brand-tint);color:var(--brand);margin-bottom:12px}
  .navcard__ic svg{width:19px;height:19px}
  .navcard__t{font-weight:700;font-size:15px;color:var(--text-strong);margin-bottom:3px}
  .navcard__d{font-size:12.5px;color:var(--text-muted);line-height:1.5}

  /* ============ AUTH (centerpiece) — branded split ============ */
  .auth{position:relative;min-height:calc(100vh - 64px);display:grid;grid-template-columns:1.05fr .95fr}
  .auth__aside{position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;gap:28px;
    padding:clamp(34px,5vw,76px);border-right:1px solid var(--border-subtle);
    background:
      radial-gradient(820px 480px at 76% -8%, var(--ambient-glow), transparent 60%),
      radial-gradient(680px 520px at 6% 114%, var(--ambient-glow-2), transparent 58%),
      color-mix(in srgb,var(--bg-page) 90%, var(--brand) 3%)}
  .auth__aside::before{content:"";position:absolute;inset:0;z-index:0;pointer-events:none;
    background-image:linear-gradient(var(--grid-line) 1px,transparent 1px),linear-gradient(90deg,var(--grid-line) 1px,transparent 1px);
    background-size:60px 60px;
    -webkit-mask-image:radial-gradient(120% 92% at 62% 26%,#000 52%,transparent 88%);
            mask-image:radial-gradient(120% 92% at 62% 26%,#000 52%,transparent 88%)}
  .auth__globe{position:absolute;left:58%;top:44%;transform:translate(-50%,-50%);opacity:.14;z-index:0;pointer-events:none}
  .auth__aside>*{position:relative;z-index:1}
  .auth__intro{display:flex;flex-direction:column;gap:16px;max-width:34ch}
  .auth__eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--brand);font-weight:700;display:inline-flex;align-items:center;gap:9px}
  .auth__eyebrow::before{content:"";width:22px;height:1px;background:var(--brand);opacity:.7}
  .auth__head{font-family:var(--font-display,Sora,sans-serif);font-weight:800;font-size:clamp(30px,3.5vw,48px);line-height:1.03;letter-spacing:-.025em;color:var(--text-strong);margin:0}
  .auth__lead{color:var(--text-body);font-size:15.5px;line-height:1.6;margin:0}
  .auth__chips{display:flex;flex-wrap:wrap;gap:10px}
  .auth__chip{display:inline-flex;align-items:center;gap:7px;font-family:var(--font-mono);font-size:10.5px;letter-spacing:1px;text-transform:uppercase;color:var(--text-body);padding:7px 12px;border-radius:999px;border:1px solid var(--border-default);background:var(--glass-fill)}
  .auth__chip svg{width:13px;height:13px;color:var(--brand);flex:none}

  /* signing-document instrument (au- prefix; no collision with editor .sg-*) */
  .au-doc-wrap{position:relative;width:min(384px,100%)}
  .au-signer{position:relative;z-index:1;padding:16px;border-radius:var(--radius-xl);background:var(--glass-fill);border:1px solid var(--glass-border);box-shadow:var(--glass-shadow);-webkit-backdrop-filter:blur(var(--glass-blur)) saturate(1.3);backdrop-filter:blur(var(--glass-blur)) saturate(1.3)}
  .au-signer__bar{display:flex;align-items:center;gap:7px;padding-bottom:12px;border-bottom:1px solid var(--border-subtle);margin-bottom:15px}
  .au-signer__dot{width:8px;height:8px;border-radius:999px;background:var(--border-strong)}
  .au-signer__title{margin-left:auto;font-family:var(--font-mono);font-size:9.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-faint);display:inline-flex;align-items:center;gap:6px}
  .au-signer__title svg{width:12px;height:12px;color:var(--brand)}
  .au-doc{background:#fff;color:#0b1220;border-radius:var(--radius-md);padding:19px 20px 22px;box-shadow:0 18px 40px -14px rgba(0,0,0,.55);position:relative;overflow:hidden}
  .au-doc__head{display:flex;align-items:center;justify-content:space-between;margin-bottom:15px;gap:10px}
  .au-doc__org{display:inline-flex;align-items:center;gap:8px;font-family:var(--font-display,Sora,sans-serif);font-weight:800;font-size:12.5px;letter-spacing:-.02em;color:#0b1220}
  .au-doc__org svg{width:15px;height:15px;color:#2E6BFF}
  .au-doc__ref{font-family:var(--font-mono);font-size:9.5px;letter-spacing:1px;color:#5b6472}
  .au-doc__line{height:8px;border-radius:999px;background:#e3e8ef;margin-bottom:9px}
  .au-doc__line.is-short{width:56%}.au-doc__line.is-mid{width:82%}
  .au-doc__spacer{height:12px}
  .au-field{margin-top:20px;border:1.5px dashed #2E6BFF;border-radius:var(--radius-sm);background:rgba(46,107,255,.06);padding:14px 15px;position:relative}
  .au-field__tag{position:absolute;top:-11px;left:14px;background:#2E6BFF;color:#fff;font-family:var(--font-mono);font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;padding:3px 9px;border-radius:var(--radius-xs);display:inline-flex;align-items:center;gap:5px}
  .au-field__tag svg{width:11px;height:11px}
  .au-sig{display:block;height:38px}
  .au-sig svg{height:100%;width:auto;overflow:visible}
  .au-sig-stroke{fill:none;stroke:#1b4fd6;stroke-width:2.6;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:640;stroke-dashoffset:640;animation:ausig 1.7s var(--ease-out) .5s forwards}
  @keyframes ausig{to{stroke-dashoffset:0}}
  .au-sig__sub{display:block;margin-top:8px;font-family:var(--font-mono);font-size:9px;letter-spacing:.3px;color:#5b6472}
  .au-seal{position:absolute;top:12px;right:12px;width:36px;height:36px;border-radius:50%;display:grid;place-items:center;background:rgba(46,107,255,.1);border:1.5px solid #2E6BFF;color:#1b4fd6;opacity:0;transform:scale(.6);animation:auseal .5s var(--ease-out) 2.15s forwards}
  .au-seal svg{width:18px;height:18px}
  @keyframes auseal{to{opacity:1;transform:scale(1)}}
  .au-prog{display:flex;align-items:center;gap:13px;margin-top:15px}
  .au-prog__track{flex:1;height:6px;border-radius:999px;background:var(--surface-sunken);overflow:hidden}
  .au-prog__fill{height:100%;width:33%;border-radius:inherit;background:var(--grad-brand);animation:aufill .9s var(--ease-out) 2.3s forwards}
  @keyframes aufill{to{width:100%}}
  .au-prog__label{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);white-space:nowrap}
  .au-prog__label b{color:var(--brand);font-weight:600}

  .auth__main{display:flex;align-items:center;justify-content:center;padding:clamp(28px,4vw,56px)}
  .authcard{width:100%;max-width:406px}
  .authcard>.beta-chip{margin:0 0 16px}
  .beta-chip{display:inline-flex;align-items:center;gap:8px;font-family:var(--font-mono);font-size:10.5px;letter-spacing:1px;text-transform:uppercase;font-weight:700;color:var(--brand);padding:6px 12px;border-radius:999px;border:1px solid color-mix(in srgb,var(--brand) 40%,var(--glass-border));background:var(--brand-tint)}
  .beta-chip .live{width:7px;height:7px;border-radius:50%;background:var(--brand);box-shadow:0 0 10px var(--brand);animation:beat 1.8s infinite}
  @keyframes beat{0%,100%{opacity:1}50%{opacity:.35}}
  .authcard__h,.solo__h{font-family:var(--font-display,Sora,sans-serif);font-weight:800;font-size:22px;letter-spacing:-.01em;color:var(--text-strong);margin:0 0 4px}
  .authcard__sub,.solo__sub{color:var(--text-muted);font-size:13.5px;margin:0 0 20px;line-height:1.5}
  /* Google hint under the Continue-with-Google button — muted + small, matches .authcard__sub tone. */
  .authcard__hint{color:var(--text-muted);font-size:12px;line-height:1.45;margin:8px 0 0;text-align:center}

  .authtabs{display:flex;gap:3px;padding:4px;margin-bottom:20px;background:color-mix(in srgb,var(--ink-900) 60%,transparent);border:1px solid var(--glass-border);border-radius:var(--radius-lg);box-shadow:inset 0 1px 0 rgba(255,255,255,.04)}
  .authtabs button{flex:1;padding:10px 14px;font-size:13.5px;font-weight:600;border:0;background:transparent;color:var(--text-muted);border-radius:var(--radius-md);cursor:pointer;font-family:inherit;transition:background var(--dur-fast) var(--ease-out),color var(--dur-fast) var(--ease-out)}
  .authtabs button:hover{color:var(--text-strong)}
  .authtabs button.is-active{color:var(--brand);background:var(--brand-tint);box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--brand) 26%,transparent)}

  /* floating-label fields */
  .fld{position:relative}
  .fld>.ap-input{width:100%;height:54px;padding:23px 14px 9px;font-size:14.5px;background:var(--ink-900);border:1px solid var(--border-default);border-radius:var(--radius-md);color:var(--text-strong);transition:border-color var(--dur-base) var(--ease-out),box-shadow var(--dur-base) var(--ease-out)}
  .fld>.ap-input:focus{outline:0;border-color:var(--brand);box-shadow:0 0 0 3px var(--ring)}
  .fld>label{position:absolute;left:14px;top:17px;font-size:14px;color:var(--text-faint);pointer-events:none;transition:transform var(--dur-fast) var(--ease-out),font-size var(--dur-fast) var(--ease-out),color var(--dur-fast) var(--ease-out);transform-origin:left top}
  .fld>.ap-input:focus+label,.fld>.ap-input:not(:placeholder-shown)+label{transform:translateY(-10px);font-size:10.5px;letter-spacing:.4px;color:var(--brand)}
  .divider{display:flex;align-items:center;gap:12px;color:var(--text-faint);font-size:11px;font-family:var(--font-mono);letter-spacing:1.5px;text-transform:uppercase;margin:16px 0}
  .verify-banner{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px;padding:11px 15px;border-radius:11px;font-size:13.5px;background:rgba(245,158,11,.10);border:1px solid rgba(245,158,11,.35);color:var(--text)}
  .verify-banner span{flex:1;min-width:200px}
  .divider::before,.divider::after{content:"";height:1px;background:var(--border-subtle);flex:1}
  .authcard button[type=submit],.auth-solo button[type=submit]{width:100%;height:48px;font-size:14.5px;box-shadow:0 10px 26px -12px color-mix(in srgb,var(--brand) 75%,transparent)}
  .btn-google{width:100%;height:47px;gap:10px;font-size:14px}
  .btn-google svg{width:18px;height:18px}
  .li-forgot{display:block;margin:8px auto 0;padding:5px 10px;min-height:24px;background:none;border:0;cursor:pointer;font-size:13px;color:var(--text-muted);transition:color var(--dur-fast) var(--ease-out)}
  .li-forgot:hover{color:var(--brand)}
  .auth-trust{display:flex;align-items:center;justify-content:center;gap:7px;margin-top:18px;font-family:var(--font-mono);font-size:10px;letter-spacing:.5px;color:var(--text-faint)}

  /* ==================== DASHBOARD ==================== */
  .page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin:8px 0 22px}
  .page-eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:1.6px;text-transform:uppercase;color:var(--brand);margin-bottom:8px}
  .page-title{font-family:var(--font-display,Sora,sans-serif);font-size:28px;font-weight:800;letter-spacing:-.02em;color:var(--text-strong);margin:0}
  .page-sub{color:var(--text-muted);font-size:13.5px;margin-top:6px}
  .newdoc{cursor:pointer;height:42px;padding:0 18px}
  .tbl-wrap{overflow-x:auto;border:1px solid var(--glass-border);border-radius:var(--radius-lg);background:var(--glass-fill);box-shadow:var(--glass-shadow);-webkit-backdrop-filter:blur(var(--glass-blur)) saturate(1.2);backdrop-filter:blur(var(--glass-blur)) saturate(1.2)}
  .doc-table{width:100%;border-collapse:collapse;font-size:14px}
  .doc-table th{text-align:left;font-family:var(--font-mono);font-weight:600;color:var(--text-faint);font-size:10.5px;text-transform:uppercase;letter-spacing:1px;padding:13px 16px;border-bottom:1px solid var(--border-default)}
  .doc-table td{padding:14px 16px;border-bottom:1px solid var(--border-subtle);vertical-align:middle;color:var(--text-body)}
  .doc-table tbody tr{transition:background var(--dur-fast) var(--ease-out)}
  .doc-table tbody tr:last-child td{border-bottom:0}
  .doc-table tbody tr:hover{background:color-mix(in srgb,var(--brand) 5%,transparent)}
  .doc-cell{display:flex;align-items:center;gap:12px}
  .doc-ic{flex:none;width:34px;height:34px;border-radius:9px;display:grid;place-items:center;background:var(--brand-tint);border:1px solid color-mix(in srgb,var(--brand) 22%,transparent);color:var(--brand)}
  .doc-ic svg{width:16px;height:16px}
  .prog{font-family:var(--font-mono);font-variant-numeric:tabular-nums;color:var(--text-muted)}
  .rowacts{display:flex;gap:6px;justify-content:flex-end}
  .doc-name{cursor:pointer;font-weight:600;color:var(--text-strong)}
  .doc-name:hover{color:var(--brand)}
  input[type=file]{color:var(--text-muted);font-size:13px}
  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
  /* ---- dashboard KPI summary + search/filter (pure client-side over the fetched list) ---- */
  .dash-kpis{display:flex;flex-wrap:wrap;gap:12px;margin:0 0 16px}
  .dash-kpi{flex:1;min-width:132px;display:flex;flex-direction:column;gap:4px;padding:13px 15px;border:1px solid var(--glass-border);border-radius:var(--radius-lg);background:var(--glass-fill);box-shadow:var(--glass-shadow);-webkit-backdrop-filter:blur(var(--glass-blur)) saturate(1.2);backdrop-filter:blur(var(--glass-blur)) saturate(1.2)}
  .dash-kpi__n{font-family:var(--font-display,Sora,sans-serif);font-size:24px;font-weight:800;letter-spacing:-.02em;color:var(--text-strong);font-variant-numeric:tabular-nums;line-height:1}
  .dash-kpi__l{font-family:var(--font-mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--text-faint)}
  .dash-kpi--draft .dash-kpi__n{color:var(--text-body)}
  .dash-kpi--sent .dash-kpi__n{color:var(--brand)}
  .dash-kpi--completed .dash-kpi__n{color:var(--success)}
  .dash-kpi--closed .dash-kpi__n{color:var(--text-muted)}
  .dash-tools{display:flex;flex-wrap:wrap;align-items:center;gap:12px;margin:0 0 14px}
  .dash-search{position:relative;flex:1;min-width:220px}
  .dash-search .ap-input{width:100%;height:40px;padding:0 14px 0 38px;font-size:14px;background:var(--ink-900);border:1px solid var(--border-default);border-radius:var(--radius-md);color:var(--text-strong)}
  .dash-search .ap-input:focus{outline:0;border-color:var(--brand);box-shadow:0 0 0 3px var(--ring)}
  .dash-search__ic{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--text-faint);pointer-events:none}
  .dash-chips{display:flex;flex-wrap:wrap;gap:6px}
  .dash-chip{font-family:inherit;font-size:12.5px;font-weight:600;padding:8px 13px;border-radius:999px;border:1px solid var(--border-default);background:var(--ink-800,rgba(255,255,255,.02));color:var(--text-muted);cursor:pointer;transition:background var(--dur-fast) var(--ease-out),color var(--dur-fast) var(--ease-out),border-color var(--dur-fast) var(--ease-out)}
  .dash-chip:hover{color:var(--text-strong);border-color:var(--border-strong)}
  .dash-chip.is-active{color:var(--brand);background:var(--brand-tint);border-color:color-mix(in srgb,var(--brand) 40%,transparent)}
  .dash-nomatch{padding:26px 20px;text-align:center;color:var(--text-muted);font-size:13.5px}
  /* ---- first-run empty state — an inviting "send your first document" CTA (only when 0 docs) ---- */
  .firstrun .ap-empty__body{max-width:48ch}
  .firstrun__steps{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin:18px 0 2px}
  .firstrun__step{display:inline-flex;align-items:center;gap:8px;font-size:12.5px;font-weight:600;color:var(--text-body);padding:7px 14px 7px 8px;border:1px solid var(--border-subtle);border-radius:999px;background:var(--ink-800,rgba(255,255,255,.02))}
  .firstrun__n{width:20px;height:20px;flex:none;display:grid;place-items:center;border-radius:50%;background:var(--brand-tint);color:var(--brand);font-family:var(--font-mono);font-size:11px;font-weight:700}
  .firstrun .ap-empty__acts{margin-top:16px}
  .firstrun #empty-upload{height:46px;padding:0 22px;font-size:14.5px;cursor:pointer;box-shadow:0 10px 26px -12px color-mix(in srgb,var(--brand) 75%,transparent)}

  /* ==================== ACCOUNT ==================== */
  .acct-grid{display:grid;grid-template-columns:1fr;gap:0;max-width:580px;padding:4px 20px}
  .kv{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid var(--border-subtle);font-size:14.5px}
  .kv:last-child{border-bottom:0}
  .kv>span:first-child{font-family:var(--font-mono);font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--text-faint)}
  /* Account action notes: positive (success) vs error. Success must NOT render error-red. */
  .acct-note{font-size:13.5px;margin-bottom:14px;line-height:1.5}
  .acct-note--ok{color:var(--success,#2ee6a0)}
  .acct-note--err{color:var(--error,#ff6b6b)}
  /* ---- Developer API keys (Account view) ---- */
  .acct-keys{max-width:580px;padding:20px}
  .acct-keys__head{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:6px}
  .acct-keys__title{font-family:var(--font-display,Sora,sans-serif);font-size:16px;font-weight:800;letter-spacing:-.01em;color:var(--text-strong);margin:0 0 4px}
  .acct-keys__sub{font-size:13px;color:var(--text-muted);margin:0;line-height:1.5;max-width:340px}
  .acct-keys__docs{color:var(--brand);font-weight:600;white-space:nowrap}
  .acct-keys__docs:hover{text-decoration:underline}
  .acct-keys .ap-btn svg{width:15px;height:15px}
  .keys-empty{font-size:13.5px;color:var(--text-muted);padding:14px 0 4px;margin:0}
  .keys-list{display:flex;flex-direction:column;gap:10px;margin-top:14px}
  .key-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 15px;border:1px solid var(--border-default);border-radius:var(--radius-md);background:var(--ink-800,rgba(255,255,255,.02))}
  .key-row__main{min-width:0}
  .key-row__top{display:flex;align-items:center;gap:9px;margin-bottom:5px}
  .key-row__label{font-weight:600;font-size:14px;color:var(--text-strong);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .key-mode{text-transform:uppercase;font-size:9.5px;letter-spacing:.6px}
  .key-row__meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:12px;color:var(--text-faint)}
  .key-prefix{font-family:var(--font-mono);font-size:12px;color:var(--text-muted);background:var(--ink-900,rgba(0,0,0,.25));padding:2px 7px;border-radius:5px}
  .key-dot{opacity:.5}
  /* create form */
  .keys-form{margin-top:14px;padding:15px;border:1px solid var(--border-default);border-radius:var(--radius-md);background:var(--ink-800,rgba(255,255,255,.02))}
  .keys-form__row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .keys-form .ap-input{flex:1;min-width:180px;height:40px;padding:0 13px;font-size:14px;background:var(--ink-900);border:1px solid var(--border-default);border-radius:var(--radius-md);color:var(--text-strong)}
  .keys-form .ap-input:focus{outline:0;border-color:var(--brand);box-shadow:0 0 0 3px var(--ring)}
  .keys-seg{display:inline-flex;border:1px solid var(--border-default);border-radius:var(--radius-md);overflow:hidden;flex:none}
  .keys-seg button{appearance:none;background:none;border:0;color:var(--text-muted);font:inherit;font-size:13px;font-weight:600;cursor:pointer;height:40px;padding:0 15px;transition:background var(--dur-fast) var(--ease-out),color var(--dur-fast) var(--ease-out)}
  .keys-seg button+button{border-left:1px solid var(--border-default)}
  .keys-seg button.is-on{background:var(--brand-tint);color:var(--brand)}
  .keys-form__actions{display:flex;gap:9px;margin-top:12px}
  /* one-time reveal callout */
  .key-reveal{margin-top:14px;padding:16px;border:1px solid color-mix(in srgb,var(--brand) 45%,transparent);border-radius:var(--radius-md);background:var(--brand-tint)}
  .key-reveal__title{display:flex;align-items:center;gap:8px;font-weight:700;font-size:13.5px;color:var(--text-strong);margin-bottom:4px}
  .key-reveal__title svg{width:16px;height:16px;color:var(--brand);flex:none}
  .key-reveal__note{font-size:12.5px;color:var(--text-muted);margin:0 0 12px;line-height:1.5}
  .key-reveal__box{display:flex;align-items:center;gap:8px;background:var(--ink-900,#0b1020);border:1px solid var(--border-default);border-radius:var(--radius-md);padding:10px 12px}
  .key-reveal__val{flex:1;min-width:0;font-family:var(--font-mono);font-size:13px;color:var(--text-strong);overflow-x:auto;white-space:nowrap;word-break:break-all}
  .key-reveal__actions{display:flex;gap:9px;margin-top:12px}

  /* ============ EDITOR + TRACK (sg-* geometry preserved) ============ */
  .sg-wrap{max-width:1240px}
  .sg-head{display:flex;align-items:center;gap:12px;margin:6px 0 16px;flex-wrap:wrap}
  .sg-head h1{font-family:var(--font-display,Sora,sans-serif);font-size:22px;font-weight:800;letter-spacing:-.01em;margin:0;color:var(--text-strong)}
  .sg-editor{display:grid;grid-template-columns:270px minmax(0,1fr) 270px;gap:16px;align-items:start}
  .sg-rail,.sg-props{background:var(--glass-fill);border:1px solid var(--glass-border);border-radius:var(--radius-lg);box-shadow:var(--glass-shadow);-webkit-backdrop-filter:blur(var(--glass-blur)) saturate(1.2);backdrop-filter:blur(var(--glass-blur)) saturate(1.2);padding:16px;position:sticky;top:80px;max-height:calc(100vh - 150px);overflow-y:auto}
  .sg-rail h3,.sg-props h3{font-family:var(--font-mono);font-size:10.5px;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-faint);margin:18px 0 9px}
  .sg-rail h3:first-child{margin-top:0}
  .sg-canvas{min-width:0;display:flex;flex-direction:column;align-items:center;overflow-x:auto}
  .sg-page{position:relative;margin:0 auto 20px;max-width:900px;width:100%;min-height:320px;background:var(--surface-card,#111a27);border:1px solid var(--border-default);border-radius:10px;box-shadow:0 18px 46px -18px rgba(0,0,0,.6);overflow:hidden}
  .sg-page img{display:block;width:100%;height:auto;user-select:none;-webkit-user-drag:none}
  .sg-page-err{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;padding:20px;color:var(--text-muted);font-size:13.5px;background:rgba(255,107,107,.05)}
  /* ---- PDF.js hi-fi render layer (additive; the PNG <img> is the base/fallback) -------------
     The canvas paints OVER the img and the PNG is hidden ONLY once a canvas has actually painted
     (.sg-pdf-on). Any load/render failure never adds that class → the img shows = today's exact
     behavior. canvas + text layer are pointer-events:none so every .sg-page drop/click handler and
     .sg-field/.sg-rd overlay keeps working unchanged; source DOM order (img<canvas<text<field<rd)
     gives the z-stack with no positive z-index that could bury a field. */
  .sg-pdf-canvas{position:absolute;inset:0;width:100%;height:100%;display:none;pointer-events:none;border-radius:inherit}
  .sg-page.sg-pdf-on img{visibility:hidden}
  .sg-page.sg-pdf-on .sg-pdf-canvas{display:block}
  .sg-pdf-text{position:absolute;inset:0;overflow:hidden;line-height:1;pointer-events:none;-webkit-user-select:none;user-select:none;forced-color-adjust:none}
  .sg-pdf-text span,.sg-pdf-text br{position:absolute;white-space:pre;transform-origin:0 0;color:transparent}
  .sg-pdf-text ::selection{background:rgba(46,107,255,.28)}
  .sg-page.sg-pdf-select .sg-pdf-text{pointer-events:auto;-webkit-user-select:text;user-select:text;cursor:text}
  /* Segmented zoom pill: [ − | 100% | + | Fit ]. Percent is a button (resets to 100%). */
  .sg-zoom{display:inline-flex;align-items:stretch;border:1px solid var(--border-default);border-radius:999px;background:var(--ink-800,rgba(255,255,255,.02));overflow:hidden}
  .sg-zoom>button{appearance:none;-webkit-appearance:none;background:none;border:0;color:var(--text-muted);font:inherit;cursor:pointer;height:32px;min-width:36px;padding:0 10px;display:inline-grid;place-items:center;transition:background var(--dur-fast) var(--ease-out),color var(--dur-fast) var(--ease-out)}
  .sg-zoom>button+button{border-left:1px solid var(--border-subtle)}
  .sg-zoom>button:hover{background:var(--brand-tint);color:var(--text-strong)}
  .sg-zoom>button:focus-visible{outline:2px solid var(--brand);outline-offset:-2px}
  .sg-zoom-val{min-width:54px;font-variant-numeric:tabular-nums;font-weight:600;color:var(--text-strong)}
  .sg-zoom-fit{font-size:12px;font-weight:600;letter-spacing:.02em}
  .sg-histgrp{display:inline-flex;gap:6px}
  .sg-histgrp .ap-btn[disabled]{opacity:.4;cursor:not-allowed}
  .sg-field{position:absolute;box-sizing:border-box;border:1.5px solid;border-radius:6px;font-size:11px;cursor:move;display:flex;align-items:center;justify-content:center;touch-action:none}
  .sg-field.sg-opt{border-style:dashed}
  .sg-field.sg-sel{outline:2px solid;outline-offset:1px;z-index:5}
  .sg-field:focus-visible{outline:2px solid var(--brand);outline-offset:2px;z-index:5}
  .sg-flabel{padding:0 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600;pointer-events:none}
  /* Placed-field type glyph — inherits the field's inline signer color via currentColor. flex:none
     so the label keeps its ellipsis; .sg-field is already flex/center so the two sit as a row. */
  .sg-ficon{flex:none;display:flex;pointer-events:none}
  .sg-ficon svg{width:14px;height:14px}
  .sg-field .rz{position:absolute;right:-12px;bottom:-12px;width:24px;height:24px;background:transparent;cursor:nwse-resize;touch-action:none;display:grid;place-items:center}
  .sg-field .rz::after{content:"";width:12px;height:12px;background:currentColor;border-radius:3px}
  .sg-field .sg-del{position:absolute;top:-13px;right:-7px;cursor:pointer;font:inherit;font-size:15px;line-height:1;color:inherit;background:var(--bg-page,#0b1017);border:1px solid currentColor;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;touch-action:manipulation;appearance:none;-webkit-appearance:none;padding:0}
  /* Precise pointers (mouse) get the original compact handles so the enlarged touch hit-zones
     don't protrude over adjacent fields on dense layouts. Touch keeps the WCAG 2.5.8 24px target
     above; equivalent controls exist either way (props-panel Delete, Ctrl+arrow resize). */
  @media (pointer: fine){
    .sg-field .rz{right:-5px;bottom:-5px;width:12px;height:12px;background:currentColor}
    .sg-field .rz::after{display:none}
    .sg-field .sg-del{top:-10px;right:-4px;width:17px;height:17px;font-size:14px}
  }
  .sg-signer{border-left:3px solid transparent;padding:10px 11px;margin-bottom:8px;border-radius:10px;background:rgba(255,255,255,.02);border:1px solid var(--border-subtle);transition:background var(--dur-fast) var(--ease-out)}
  .sg-signer-active{background:var(--brand-tint);border-color:color-mix(in srgb,var(--brand) 26%,transparent)}
  .sg-srow{display:flex;align-items:center;gap:8px;margin-bottom:7px}
  .sg-swatch{width:14px;height:14px;border-radius:4px;flex:none}
  .sg-active-lbl{font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:5px;cursor:pointer;flex:1}
  .sg-rm{background:none;border:0;color:var(--text-faint);font-size:18px;cursor:pointer;line-height:1;min-width:24px;min-height:24px;display:inline-grid;place-items:center;padding:0}
  .sg-rm:hover{color:var(--error)}
  .sg-sin{margin-bottom:6px;font-size:13px;padding:8px 10px}
  /* Signing-order segmented toggle (draft-only; shown when ≥2 signers) */
  .sg-order{margin:2px 0 4px}
  .sg-order__seg{display:flex;gap:3px;padding:3px;background:color-mix(in srgb,var(--ink-900) 60%,transparent);border:1px solid var(--glass-border);border-radius:var(--radius-md)}
  .sg-order__seg button{flex:1;padding:8px 6px;font-size:12px;font-weight:600;font-family:inherit;border:0;background:transparent;color:var(--text-muted);border-radius:var(--radius-sm);cursor:pointer;transition:background var(--dur-fast) var(--ease-out),color var(--dur-fast) var(--ease-out)}
  .sg-order__seg button:hover{color:var(--text-strong)}
  .sg-order__seg button.is-active{color:var(--brand);background:var(--brand-tint);box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--brand) 26%,transparent)}
  .sg-order__seg button[disabled]{opacity:.5;cursor:not-allowed}
  .sg-order__hint{font-size:11.5px;line-height:1.4;color:var(--text-muted);margin:6px 0 0}
  .sg-pal{display:block;width:100%;text-align:left;margin-bottom:6px;cursor:grab;padding:9px 11px;transition:border-color var(--dur-fast) var(--ease-out),color var(--dur-fast) var(--ease-out)}
  .sg-pal[disabled]{opacity:.4;cursor:not-allowed}
  /* Armed field = real pressed state (filled brand-tint + inset ring), reinforcing aria-pressed. */
  .sg-pal-armed{outline:2px solid var(--brand);outline-offset:-1px;color:var(--brand);background:var(--brand-tint);box-shadow:inset 0 0 0 1px var(--brand)}
  /* Icon+label row for palette buttons. This second .sg-pal rule sits AFTER the base (L250) so its
     display:flex wins while the base's width/padding/margin/cursor/transition still apply. */
  .sg-pal{display:flex;align-items:center;gap:9px}
  .sg-pal-ic{flex:none;display:flex;color:var(--text-muted)}
  .sg-pal-ic svg{width:16px;height:16px}
  .sg-pal:not([disabled]):hover .sg-pal-ic,.sg-pal-armed .sg-pal-ic{color:inherit}
  .sg-pal-tx{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  /* Tool-armed canvas cue (belt-and-suspenders with the existing inline crosshair on .sg-page). */
  .sg-canvas-armed .sg-page{cursor:crosshair}
  /* Dismissible arm-hint banner — advertises Pass-4 keyboard placement (Enter) and Esc-to-cancel. */
  .sg-armbar{position:sticky;top:8px;z-index:8;display:flex;align-items:center;gap:10px;margin:0 auto 14px;max-width:900px;padding:9px 14px;border-radius:999px;background:var(--brand-tint);border:1px solid color-mix(in srgb,var(--brand) 45%,transparent);color:var(--text-strong);font-size:13px;box-shadow:0 8px 24px -12px rgba(0,0,0,.5);-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px)}
  .sg-armdot{width:9px;height:9px;border-radius:50%;background:var(--brand);flex:none;box-shadow:0 0 0 3px color-mix(in srgb,var(--brand) 22%,transparent);animation:sg-armpulse 1.6s var(--ease-out) infinite}
  @keyframes sg-armpulse{0%,100%{opacity:1}50%{opacity:.35}}
  .sg-armtxt{flex:1;line-height:1.35}
  .sg-armbar kbd{font-family:var(--font-mono);font-size:11px;background:rgba(255,255,255,.08);border:1px solid var(--border-default);border-radius:4px;padding:1px 5px}
